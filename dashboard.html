<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Dashboard</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://server.arcgisonline.com; font-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src blob:; child-src blob:; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co https://server.arcgisonline.com https://*.tile.openstreetmap.org; form-action 'self'">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
#dashMap{height:300px}
#dashMap .maplibregl-canvas{border-radius:15px}
.dash-mapwrap{position:relative}
.dash-sidepanel{position:absolute;top:0;right:0;bottom:0;width:min(320px,92%);z-index:5;
  background:#fff;border-left:1px solid var(--line);box-shadow:-6px 0 18px rgba(0,0,0,.1);
  transform:translateX(100%);visibility:hidden;transition:transform .2s ease,visibility .2s;
  display:flex;flex-direction:column;border-radius:0 15px 15px 0;overflow:hidden}
.dash-sidepanel.open{transform:translateX(0);visibility:visible}
.dash-sidepanel .dash-pclose{position:absolute;top:8px;right:10px;z-index:2;width:28px;height:28px;border-radius:50%;
  border:1px solid var(--line);background:#fff;color:var(--ink-3);font-size:16px;cursor:pointer}
.dash-sidepanel .dash-pinlist{flex:1;overflow:auto;padding:14px 14px 16px;padding-top:40px;font-size:13px}
</style>
</head>
<body data-nav="dash">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Dashboard</div>
      <h1 id="dashHi">Welcome back</h1>
      <p id="dashSub"></p>
    </div>
    <div class="strip" id="dashStrip"></div>
    <div class="cols">
      <div>
        <div class="block" style="padding:16px 18px">
          <div class="bt-row"><h2>What's changing around you</h2><a href="maps.html" data-znav="maps.html" id="dashMapLink">Open full map →</a></div>
          <div class="mapwrap dash-mapwrap" id="dashMapWrap" style="box-shadow:none">
            <div id="dashMap" tabindex="0" role="region" aria-label="Map preview — open the full map"></div>
            <aside class="dash-sidepanel" id="dashInfoSlide" role="complementary" aria-label="Record details" aria-hidden="true">
              <button class="dash-pclose" id="dashPanelClose" type="button" aria-label="Close panel">×</button>
              <div class="dash-pinlist" id="dashInfoPanel"></div>
            </aside>
          </div>
        </div>
        <div class="bt-row"><h2 style="font-size:15px;margin:0">Recent activity near you</h2><a href="alerts.html" data-znav="alerts.html" id="dashAllAlerts" style="font-size:12.5px;color:var(--green);text-decoration:none;font-weight:600">All alerts →</a></div>
        <div id="dashRecent"></div>
      </div>
      <div>
        <div class="block">
          <div class="bt-row"><h2>Your Saved Places</h2><a href="properties.html">Manage →</a></div>
          <div id="dashProps"></div>
          <button class="addbtn" type="button" style="width:100%;justify-content:center;margin-top:10px" id="dashAddPlace">+ Add a Saved Place</button>
        </div>
        <div class="block">
          <div class="bt-row"><h2>Your ZIP Codes</h2><a href="community.html" data-znav="community.html" id="dashZipOpen">Open →</a></div>
          <div id="dashCommunities"></div>
        </div>
        <div class="block" id="dashWatchBlock">
          <div class="bt-row"><h2>Worth watching nearby</h2><a href="maps.html" data-znav="maps.html" id="dashWatchMap">See on map →</a></div>
          <div class="chips" id="dashWatch"></div>
        </div>
        <div class="block">
          <div class="bt-row"><h2 class="bt" style="margin:0"><a href="alerts.html" data-znav="alerts.html" id="dashMeetingsHead" class="section-link">Upcoming meetings</a></h2></div>
          <div id="dashMeetings"></div>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="lib/data.js"></script>
<script src="lib/topic-prefs.js"></script>
<script src="lib/templates.js"></script>
<script src="lib/map.js?v=20260720b"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty, zip = S.zip;
  var realHome = HS.realHome();
  var nav = HS.pageHref ? HS.pageHref.bind(HS) : function (p, o) { return HS.navHref(p, (o && o.zip) || zip); };

  // Never hang silently: a failed read renders an honest retry state.
  var c, projects, changes, meetings;
  try {
    c = await HS.data.community(S.zip);
    projects = await HS.data.projects(S.zip, home);
    changes = await HS.data.changes(S.zip, home);
    meetings = await HS.data.meetings(S.zip, home);
  } catch (e) {
    console.warn('[dashboard] data load failed', e);
    document.querySelector('.page').innerHTML = '<div class="ph"><h1>We couldn\'t load your dashboard</h1>'
      + '<p>Your connection may have dropped, or our data service is briefly unavailable.</p></div>'
      + '<button class="btn primary" onclick="location.reload()">Try again</button>';
    return;
  }

  function mapCtx() {
    var o = { zip: zip };
    if (realHome && realHome.id) o.place = realHome.id;
    return o;
  }

  // FIRST-TIME vs RETURNING: a signed-out visitor has never been here — never
  // greet them "Welcome back"; lead with what HomeSignal does. With no homes
  // followed, the subline is an invitation (plus honest sample-ZIP disclosure),
  // never "0 homes followed".
  var name = S.session && S.session.name ? S.session.name.split(' ')[0] : '';
  document.getElementById('dashHi').textContent = S.session
    ? (name ? 'Welcome back, ' + name : 'Welcome back')
    : 'See what\'s changing around your home';
  document.getElementById('dashSub').textContent = S.properties.length
    ? S.properties.length + ' saved place' + (S.properties.length === 1 ? '' : 's') + ' — here\'s what needs you across them.'
    : 'Add your home and we\'ll watch official county and permit records around it'
      + ((HS.isSample && HS.isSample()) ? ' — right now you\'re viewing our sample ZIP code, Del Valle, TX.' : '.');

  var openCount = changes.filter(function (x) { var d = HS.daysUntil(x.window_closes_at); return d != null && d >= 0; }).length;
  document.getElementById('dashStrip').innerHTML =
    HS.tpl.statTileLink(projects.length, 'Projects near you', '', nav('development.html', Object.assign({ sort: 'distance' }, mapCtx())))
    + HS.tpl.statTileLink(openCount, 'Action windows open', 'accent', nav('alerts.html', Object.assign({ band: 'open' }, mapCtx())))
    + (c && c.growth_pressure ? HS.tpl.statTileLink('<span style="font-size:19px">' + HS.esc(c.growth_pressure) + '</span>', 'Growth pressure', '', nav('development.html', Object.assign({ lens: 2 }, mapCtx()))) : '')
    + (c && c.community_score != null ? HS.tpl.statTileLink(c.community_score, 'ZIP Score', 'g', nav('community.html', Object.assign({ focus: 'score' }, mapCtx()))) : '');

  // Stamp ZIP-aware header links (paintNavHrefs runs at boot; re-stamp after we know data).
  var mapHref = nav('maps.html', mapCtx());
  ['dashMapLink', 'dashWatchMap', 'dashAllAlerts', 'dashZipOpen', 'dashMeetingsHead'].forEach(function (id) {
    var el = document.getElementById(id);
    if (!el) return;
    if (id === 'dashMeetingsHead') el.href = nav('alerts.html', Object.assign({ category: 'Government & civic' }, mapCtx()));
    else if (id === 'dashAllAlerts') el.href = nav('alerts.html', mapCtx());
    else if (id === 'dashZipOpen') el.href = nav('community.html', mapCtx());
    else el.href = mapHref;
  });

  // map preview — HS.buildLive is the guarded backbone chain (GL -> Leaflet raster
  // -> schematic; never throws into this init). NEVER-FAKED rule: the home dot and
  // home-anchored center exist ONLY for a real resident home in this ZIP — otherwise
  // the ZIP centroid (app_community_meta.lat/lng) anchors, else the first record.
  var items = changes.filter(function (x) { return !x.quiet; }).concat(projects)
    .filter(function (x) { return x.lat && x.lng; }).slice(0, 6);
  var dashMap = document.getElementById('dashMap');
  var dashMapWrap = document.getElementById('dashMapWrap');
  var hasRealHome = !!realHome;
  var center = (hasRealHome ? { lat: home.lat, lng: home.lng } : null)
    || (c && c.lat != null && c.lng != null ? { lat: c.lat, lng: c.lng } : null)
    || (items[0] ? { lat: items[0].lat, lng: items[0].lng } : null);

  function renderDashDetail(it) {
    var mk = HS.resolveMarker(it);
    var panel = document.getElementById('dashInfoPanel');
    var name = it.name || it.title || 'Record';
    var typeLabel = mk.typeLabel || it.type || it.category || 'Project';
    var summary = it.sowhat || it.plain_language || it.stage || 'On the public record near you.';
    panel.innerHTML = '<div style="font-size:12px;color:var(--ink-3)">' + HS.esc(typeLabel)
      + (it.status ? ' · ' + HS.esc(it.status) : '') + (it.dist ? ' · ' + HS.esc(it.dist) : '') + '</div>'
      + '<h3 style="margin:6px 0 8px;font-size:16px">' + HS.esc(name) + '</h3>'
      + '<p style="margin:0;line-height:1.5;color:var(--ink-2)">' + HS.esc(summary) + '</p>'
      + (it.source_ref ? '<button class="btn primary" style="margin-top:12px" onclick="window.open(\'' + HS.esc(it.source_ref) + '\',\'_blank\',\'noopener\')">View official record ▸</button>' : '');
  }
  var dashSidebar = HS.createMapSidebar({
    panel: 'dashInfoPanel',
    slide: 'dashInfoSlide',
    onSelect: function (it) { renderDashDetail(it); }
  });
  document.getElementById('dashPanelClose').addEventListener('click', function () { dashSidebar.close(); });

  function goMapPreview() { location.href = mapHref; }
  function onMarkerClick(it) {
    if (!it) return;
    dashSidebar.select(it);
  }

  HS.buildLive(dashMap, {
    center: center, items: items, home: hasRealHome ? home : null,
    interactive: true, zoom: 12.4, radiusMi: 1.5, w: 640, h: 300,
    itemClick: onMarkerClick,
    onReady: function (map) {
      if (map && map.on) {
        map.on('dragstart', function () { dashMap._hsDragged = true; });
        map.on('dragend', function () { setTimeout(function () { dashMap._hsDragged = false; }, 0); });
      }
    }
  });

  // The preview surface opens the full map on background click; marker clicks open the sidebar.
  dashMapWrap.style.cursor = 'pointer';
  dashMapWrap.addEventListener('click', function (e) {
    if (dashMap._hsDragged || e.target.closest('[data-hs-map-item]') || e.target.closest('.dash-sidepanel')) return;
    goMapPreview();
  });
  dashMapWrap.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.target.closest('[data-hs-map-item]') && e.target.id === 'dashMap') goMapPreview();
  });

  var projectIds = new Set(projects.map(function (p) { return p.id; }));

  // recent — ranked by impact; each card opens its alert or project detail.
  var recent = changes.filter(function (x) { return !x.quiet; })
    .sort(function (a, b) { return (b.impacts ? b.impacts.length : 0) - (a.impacts ? a.impacts.length : 0); }).slice(0, 2);
  document.getElementById('dashRecent').innerHTML = recent.map(function (ch) {
    var href = HS.itemNavHref ? HS.itemNavHref(ch, zip) : null;
    return HS.tpl.miniCardLink(ch, ch.category, href);
  }).join('');

  // properties — each row selects that place and opens its property page.
  document.getElementById('dashProps').innerHTML = S.properties.map(function (p) {
    return '<a class="swrow swrow-link" href="property.html?id=' + encodeURIComponent(p.id) + '" data-place-id="' + HS.esc(p.id) + '">'
      + '<div class="miniscore">' + (p.score || '') + '</div>'
      + '<div class="pinfo"><div class="pt">' + HS.esc(p.address) + ' <span style="font-size:10px;color:var(--green);font-weight:700">· ' + HS.esc(String(p.tag || p.label || 'home').toUpperCase()) + '</span></div>'
      + '<div class="pa">' + HS.esc(p.city) + '</div></div></a>';
  }).join('');
  document.getElementById('dashProps').addEventListener('click', function (e) {
    var row = e.target.closest('[data-place-id]');
    if (row) HS.selectProperty(row.getAttribute('data-place-id'));
  });

  document.getElementById('dashAddPlace').addEventListener('click', function () { HS.addHome(); });

  // followed ZIP codes
  document.getElementById('dashCommunities').innerHTML = HS.communitiesStripHTML({ zipLabels: true });

  // Worth watching nearby — closest REAL project records; each chip opens detail.
  var watch = projects.slice()
    .sort(function (a, b) { return (a.distance_mi || 9e9) - (b.distance_mi || 9e9); }).slice(0, 4);
  if (watch.length) {
    document.getElementById('dashWatch').innerHTML = watch.map(function (p) {
      return '<a class="wchip wchip-link" href="' + HS.esc(nav('development.html', { zip: zip, id: p.id })) + '">'
        + HS.esc(p.name) + (p.dist ? ' · ' + HS.esc(p.dist) : '') + '</a>';
    }).join('');
  } else {
    var wb = document.getElementById('dashWatchBlock'); if (wb) wb.style.display = 'none';
  }

  document.getElementById('dashMeetings').innerHTML = meetings.length
    ? meetings.map(function (m) {
        var href = HS.meetingNavHref ? HS.meetingNavHref(m, zip, projectIds) : null;
        return HS.tpl.meetingRowLink(m, href);
      }).join('')
    : '<p class="quiet" style="font-size:12.5px;margin:0">No upcoming public meetings on file for this ZIP yet.</p>';
});
</script>
</body>
</html>
