name: Regenerate sitemap.xml from communities (daily)

# Zero-touch SEO: rebuild sitemap.xml from the live communities table so newly-added
# communities become indexable with no per-community edit. Reads only the public anon
# key (RLS read); commits sitemap.xml back to main (which republishes GitHub Pages).
on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemap
  cancel-in-progress: false

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate sitemap.xml from the DB
        run: python scripts/gen_sitemap.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: regenerate sitemap.xml from communities [skip ci]"
            git push
          fi
