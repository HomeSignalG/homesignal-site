name: Regenerate sitemap.xml from communities (daily)

# Zero-touch SEO: rebuild sitemap.xml from the live communities table so newly-added
# communities become indexable with no per-community edit. Reads only the public anon
# key (RLS read); commits sitemap.xml back to main (which republishes GitHub Pages).
#
# NOTE: the commit message must NOT carry [skip ci]. Pages here is classic "deploy from
# a branch", whose internal pages-build-deployment IS suppressed by [skip ci] — so a
# [skip ci] regen that lands as the branch tip commits the new sitemap but never
# publishes it (it only goes live when some later normal commit rebuilds Pages). The
# verify-* workflows are path-scoped to source files (not sitemap.xml), so a plain
# commit here rebuilds Pages without triggering them.
#
# PUSH AUTH: the "Protect Main" ruleset blocks direct pushes from the workflow
# GITHUB_TOKEN (github-actions[bot] cannot be a ruleset bypass actor), so the push
# rides the DEPLOY_KEY repo secret — an SSH deploy key covered by the ruleset's
# "Deploy keys" bypass. The guard step fails the run up front if the secret is
# missing, because checkout would otherwise silently fall back to the (blocked)
# GITHUB_TOKEN and the failure would surface only at push time.
on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemap
  cancel-in-progress: false

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Require DEPLOY_KEY (ruleset-bypass push credential)
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::error::DEPLOY_KEY secret is not set. This workflow pushes to main, which the ruleset blocks for GITHUB_TOKEN — add the SSH deploy key as the DEPLOY_KEY Actions secret (Settings → Secrets and variables → Actions) and enable the Deploy keys bypass on the Protect Main ruleset."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate sitemap.xml from the DB
        run: python scripts/gen_sitemap.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: regenerate sitemap.xml from communities"
            git push
          fi
