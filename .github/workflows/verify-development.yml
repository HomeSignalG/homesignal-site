name: verify-development

# Automated, live end-to-end check that every cached ZIP development page resolves on the
# real site and — the invariant that matters — that every rendered marker carries an
# official record_url (docs/development-tracker-source-of-truth.md §9). Runs where network
# egress works (GitHub-hosted runner), the piece the build sandbox cannot do. Zero-touch:
# it reads the live `development_reports` table, so newly-cached ZIPs need no code change.

on:
  workflow_dispatch:
    inputs:
      sample:
        description: 'Optional: cap the number of ZIPs checked (e.g. "1" for a smoke run)'
        required: false
        default: ''
  schedule:
    - cron: '37 13 * * *'   # daily 13:37 UTC — catches regressions after any deploy/data change
  push:
    branches: [main]
    paths:
      - 'homesignalmap.html'
      - 'config.js'
      - 'shell.js'
      - 'partials/shell.html'
      - 'lib/data.js'
      - 'docs/*-development-reports-seed.sql'
      - 'docs/development-reports-cache.sql'
      - 'scripts/verify-development.mjs'
      - '.github/workflows/verify-development.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: npm init -y >/dev/null 2>&1 && npm i -D playwright@1 >/dev/null 2>&1 && npx playwright install --with-deps chromium
      - name: Verify development pages
        env:
          SITE_BASE: https://homesignal.net
          ZIP_PATH: '/homesignalmap.html?zip={zip}'   # canonical live route (no per-ZIP files)
          SAMPLE: ${{ github.event.inputs.sample }}
        run: node scripts/verify-development.mjs
