name: unit-tests

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.html'
      - 'test/**'
      - 'topics.canon.json'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Landing decision test
        run: node test/landing.test.mjs
      - name: Signed-out persona guard test
        run: node test/signed-out-guard.test.mjs
      - name: realHome single-source test
        run: node test/realhome.test.mjs
      - name: Topic-canon drift test
        run: node test/topic-canon.test.mjs
      - name: Email opt-in consent-contract test
        run: node test/email-optin.test.mjs
      - name: Facility-slot reservation test
        run: node test/facility-slots.test.mjs
