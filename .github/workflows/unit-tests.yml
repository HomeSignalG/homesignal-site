name: unit-tests

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.html'
      - 'test/**'
      - 'scripts/run-unit-tests.mjs'
      - 'topics.canon.json'
      - '.github/workflows/**'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.html'
      - 'test/**'
      - 'scripts/run-unit-tests.mjs'
      - 'topics.canon.json'
      - '.github/workflows/**'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch: {}

# Read-only checkout — no elevated permissions required.
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run all unit regression tests
        run: node scripts/run-unit-tests.mjs
