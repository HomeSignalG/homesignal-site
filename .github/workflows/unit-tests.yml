name: unit-tests

on:
  push:
    paths:
      - 'lib/landing.js'
      - 'test/**'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch: {}

jobs:
  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run landing decision test
        run: node test/landing.test.mjs
