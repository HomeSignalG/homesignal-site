name: verify-facility-entity

# On-demand, read-only browser check that regulated facilities follow the same lettered-pin
# + near-you-card + detail workflow as projects. Serves the CHECKED-OUT ref locally and points
# Playwright at it, so it verifies the branch's own HEAD (not the possibly-lagging Pages
# deploy) against LIVE Supabase data (the runner has egress; the sandbox does not).

on:
  workflow_dispatch:
    inputs:
      zip:
        description: 'Pilot ZIP to verify (default 78617)'
        required: false
        default: '78617'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: npm init -y >/dev/null 2>&1 && npm i -D playwright@1 >/dev/null 2>&1 && npx playwright install --with-deps chromium
      - name: Serve the checked-out site locally
        run: |
          python3 -m http.server 8000 >/tmp/serve.log 2>&1 &
          for i in $(seq 1 20); do curl -sf http://localhost:8000/maps.html >/dev/null && break; sleep 0.5; done
      - name: Verify facility entity behaviors (branch HEAD, live data)
        env:
          SITE_BASE: http://localhost:8000
          ZIP: ${{ github.event.inputs.zip || '78617' }}
        run: node scripts/verify-facility-entity.mjs
