name: db-sql

# Run a COMMITTED .sql file against the project via the Supabase Management API
# (api.supabase.com /database/query) from a GitHub runner. The runner-based cousin of
# the recon-fetch pattern: when the sandbox's direct DB path (MCP pooler) is wedged but
# the instance itself is healthy, SQL still needs an execution channel. Uses the same
# SUPABASE_ACCESS_TOKEN the deploy-edge-functions workflow already holds; the SQL comes
# from a committed file so every statement is code-reviewed and auditable. Results print
# into the job log (the receipt channel — the sandbox cannot reach the artifact store).
#
# Manual-only by design: running SQL is always a deliberate act.

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'Repo path to the .sql file to run (e.g. docs/communities-zipcodes-gin-index.sql)'
        required: true

permissions:
  contents: read

jobs:
  run-sql:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: qwnnmljucajnexpxdgxr
    steps:
      - uses: actions/checkout@v4
      - name: Execute SQL via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          FILE="${{ github.event.inputs.sql_file }}"
          echo "Running: $FILE"
          python3 - "$FILE" <<'EOF'
          import json, os, sys, urllib.request
          sql = open(sys.argv[1]).read()
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{os.environ['SUPABASE_PROJECT_REF']}/database/query",
              data=json.dumps({"query": sql}).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['SUPABASE_ACCESS_TOKEN']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as r:
                  body = r.read().decode()
                  print(f"HTTP {r.status}")
                  print("----- BEGIN RESULT -----")
                  print(body[:20000])
                  print("----- END RESULT -----")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}")
              print(e.read().decode()[:4000])
              sys.exit(1)
          EOF
