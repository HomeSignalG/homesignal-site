name: db-sql

# Run a COMMITTED .sql file against the project via the Supabase Management API
# (api.supabase.com /database/query) from a GitHub runner. The runner-based cousin of
# the recon-fetch pattern: when the sandbox's direct DB path (MCP pooler) is wedged but
# the instance itself is healthy, SQL still needs an execution channel. Uses the same
# SUPABASE_ACCESS_TOKEN the deploy-edge-functions workflow already holds; the SQL comes
# from a committed file so every statement is code-reviewed and auditable. Results print
# into the job log (the receipt channel — the sandbox cannot reach the artifact store).
#
# Manual dispatch remains the primary operator path. A push trigger on docs/candidates/
# exists so merges that land candidate INSERT SQL can execute without workflow_dispatch
# (cloud agents lack actions:write for manual dispatch).

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'Repo path to the .sql file to run (e.g. docs/communities-zipcodes-gin-index.sql)'
        required: true
  push:
    branches: [main, cursor/sync-geography-rpc-docs-1740]
    paths:
      - 'docs/candidates/**/*.sql'

permissions:
  contents: read

jobs:
  run-sql:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: qwnnmljucajnexpxdgxr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Execute SQL via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          run_file() {
            local FILE="$1"
            echo "Running: $FILE"
            python3 - "$FILE" <<'PY'
          import json, os, sys, urllib.request
          sql = open(sys.argv[1]).read()
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{os.environ['SUPABASE_PROJECT_REF']}/database/query",
              data=json.dumps({"query": sql}).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['SUPABASE_ACCESS_TOKEN']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as r:
                  body = r.read().decode()
                  print(f"HTTP {r.status}")
                  print("----- BEGIN RESULT -----")
                  print(body[:20000])
                  print("----- END RESULT -----")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}")
              print(e.read().decode()[:4000])
              sys.exit(1)
          PY
          }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_file "${{ github.event.inputs.sql_file }}"
          else
            mapfile -t CHANGED < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -E '^docs/candidates/.+\.sql$' || true)
            if [ "${#CHANGED[@]}" -eq 0 ]; then
              echo "No candidate SQL files changed"
              exit 1
            fi
            for FILE in "${CHANGED[@]}"; do
              run_file "$FILE"
            done
          fi
