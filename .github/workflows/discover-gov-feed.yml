name: discover-gov-feed

# Phase 1A — county vendor discovery (Granicus / Legistar / CivicClerk).
# READ-ONLY: probes vendor hosts, writes JSON artifact. Does not touch public.feeds.

on:
  workflow_dispatch:
    inputs:
      county:
        description: 'County name (e.g. Wake)'
        required: true
      state:
        description: 'State abbreviation (e.g. NC)'
        required: true
      community_id:
        description: 'County root community UUID'
        required: true
      hints_file:
        description: 'Optional repo path to hints JSON'
        required: false
        default: ''
      max_probes:
        description: 'Max HTTP probes (default 40)'
        required: false
        default: '40'

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Discover vendor
        env:
          DISCOVER_COUNTY: ${{ github.event.inputs.county }}
          DISCOVER_STATE: ${{ github.event.inputs.state }}
          DISCOVER_COMMUNITY_ID: ${{ github.event.inputs.community_id }}
          DISCOVER_HINTS: ${{ github.event.inputs.hints_file }}
          DISCOVER_MAX_PROBES: ${{ github.event.inputs.max_probes }}
        run: |
          set -euo pipefail
          args=(
            --county "$DISCOVER_COUNTY"
            --state "$DISCOVER_STATE"
            --community-id "$DISCOVER_COMMUNITY_ID"
            --max-probes "$DISCOVER_MAX_PROBES"
            --out results/gov-feed-discovery.json
          )
          if [ -n "$DISCOVER_HINTS" ]; then
            args+=(--hints "$DISCOVER_HINTS")
          fi
          node scripts/gov-feeds/discover-county-vendor.mjs "${args[@]}"
      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: gov-feed-discovery
          path: results/gov-feed-discovery.json
          retention-days: 14
