name: verify-representative-zips

# Curated multi-state panel beyond the original 84302/78617 smoke — exercises ingestion,
# projects, map, hearings, official links, badges, property pages, filtering, and empty states.

on:
  workflow_dispatch:
  schedule:
    - cron: '47 13 * * *'   # daily, after verify-development
  push:
    branches: [main]
    paths:
      - 'homesignalmap.html'
      - 'scripts/verify-representative-zips.mjs'
      - 'scripts/lib/verify-dev-helpers.mjs'
      - '.github/workflows/verify-representative-zips.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: npm init -y >/dev/null 2>&1 && npm i -D playwright@1 >/dev/null 2>&1 && npx playwright install --with-deps chromium
      - name: Verify representative ZIP panel
        env:
          SITE_BASE: https://homesignal.net
          ZIP_PATH: '/homesignalmap.html?zip={zip}'
        run: node scripts/verify-representative-zips.mjs
