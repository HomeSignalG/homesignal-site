name: verify-communities

# Automated, live end-to-end check of the new-layout community page on the real site.
# Runs where network egress works (GitHub-hosted runner) — the piece the build sandbox
# cannot do. INDEX-ONLY-UTAH policy: asserts every Utah page renders real sourced records
# and is indexable, and that non-Utah pages are noindexed. Zero-touch: it reads the live
# app_community_meta table (anon key from config.js), so new Utah ZIPs are covered with no
# code change.

on:
  workflow_dispatch:
    inputs:
      county:
        description: 'Optional: scope to one county (e.g. "Salt Lake")'
        required: false
        default: ''
  schedule:
    - cron: '17 13 * * *'   # daily 13:17 UTC — catches regressions after any deploy/data change
  push:
    branches: [main]
    paths:
      - 'community.html'
      - 'config.js'
      - 'lib/data.js'
      - 'docs/*-communities-seed.sql'
      - 'scripts/verify-communities.mjs'
      - '.github/workflows/verify-communities.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: npm init -y >/dev/null 2>&1 && npm i -D playwright@1 >/dev/null 2>&1 && npx playwright install --with-deps chromium
      - name: Verify community pages
        env:
          SITE_BASE: https://homesignal.net
          COUNTY: ${{ github.event.inputs.county }}
        run: node scripts/verify-communities.mjs
