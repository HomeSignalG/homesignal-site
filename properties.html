<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Saved Places</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co; form-action 'self'">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="props">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Saved Places</div>
      <h1>Your Saved Places</h1>
      <p>Follow as many homes as you like — yours, a rental, or a family member's. Each is watched independently, and you're alerted when something changes near any of them.</p>
    </div>
    <div class="strip" id="propStrip"></div>
    <div class="bt-row"><h2 style="font-size:15px;margin:0">Places you follow</h2><button class="addbtn" onclick="HS.addHome()">+ Add a Saved Place</button></div>
    <div class="propgrid" id="propGrid"></div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/topic-prefs.js"></script>
<script src="lib/templates.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state;
  // Never hang silently: a failed read renders an honest retry state.
  var changes, projects;
  try {
    changes = await HS.data.changes(S.zip, null);
    projects = await HS.data.projects(S.zip, null);
  } catch (e) {
    console.warn('[properties] data load failed', e);
    document.querySelector('.page').innerHTML = '<div class="ph"><h1>We couldn\'t load your Saved Places</h1>'
      + '<p>Your connection may have dropped, or our data service is briefly unavailable.</p></div>'
      + '<button class="btn primary" onclick="location.reload()">Try again</button>';
    return;
  }
  var avg = S.properties.length
    ? Math.round(S.properties.reduce(function(s,p){return s+(p.score||0);},0) / S.properties.length) : null;

  document.getElementById('propStrip').innerHTML =
    HS.tpl.statTile(S.properties.length, 'Saved Places', '')
    + HS.tpl.statTile(changes.filter(function(x){return HS.daysUntil(x.window_closes_at)>=0;}).length, 'Need you across all places', 'accent')
    + HS.tpl.statTile(projects.length, 'Nearby projects total', '')
    + (avg != null ? HS.tpl.statTile(avg, 'Avg property score', 'g') : '');

  var tone = { 'Your home':'var(--green)', 'Rental':'var(--amber)', 'Family':'var(--blue)' };
  document.getElementById('propGrid').innerHTML = S.properties.map(function (p) {
    // per-property computed: nearest N projects, open windows
    var near = HS.withDistance(projects, p).filter(function(x){return (x.distance_mi||9e9) <= 5;});
    var needs = HS.withDistance(changes, p).filter(function(x){return HS.daysUntil(x.window_closes_at)>=0 && (x.distance_mi||9e9)<=5;}).length;
    return '<div class="propcard" onclick="HS.selectProperty(\'' + p.id + '\');location.href=\'property.html?id=' + p.id + '\'">'
      + '<div class="miniscore">' + (p.score||'') + '</div>'
      + '<div class="pinfo"><div class="ptag" style="color:' + (tone[p.tag]||'var(--green)') + '">' + HS.esc(p.tag||p.label) + '</div>'
      + '<h3>' + HS.esc(p.address) + '</h3><div class="paddr">' + HS.esc(p.city) + ', ' + HS.esc(p.state) + ' ' + HS.esc(p.zip) + '</div>'
      + '<div class="pmeta">' + (needs ? '<span class="needs">◔ ' + needs + ' need' + (needs===1?'s':'') + ' you</span>' : '<span style="color:var(--ink-3)">Nothing needs you</span>')
      + '<span>' + near.length + ' nearby projects</span><span style="color:var(--green);font-weight:600">+' + p.value_outlook + '%</span></div></div></div>';
  }).join('')
  + '<div class="propcard" onclick="HS.addHome()" style="border-style:dashed;justify-content:center">'
  + '<div style="text-align:center"><div style="font-size:22px;color:var(--green);line-height:1">＋</div>'
  + '<div style="font-weight:600;color:var(--ink-2);font-size:13.5px;margin-top:4px">Add another Saved Place</div>'
  + '<div style="font-size:11.5px;color:var(--ink-3)">Free — follow as many as you like</div></div></div>';
});
</script>
</body>
</html>
