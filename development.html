<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Development</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co; form-action 'self'">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="dev">
<template id="hs-content"><div class="page" id="devPage">
  <div style="height:14px;width:36%;border-radius:6px;background:var(--line-2);margin:4px 0 16px"></div>
  <div class="card"><div style="height:11px;width:42%;border-radius:6px;background:var(--line-2);margin-bottom:9px"></div><div style="height:11px;width:88%;border-radius:6px;background:var(--line-2);margin-bottom:9px"></div><div style="height:11px;width:66%;border-radius:6px;background:var(--line-2)"></div></div>
  <div class="card"><div style="height:11px;width:42%;border-radius:6px;background:var(--line-2);margin-bottom:9px"></div><div style="height:11px;width:80%;border-radius:6px;background:var(--line-2)"></div></div>
</div></template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/topic-prefs.js"></script>
<script src="lib/templates.js"></script>
<script src="lib/impact.js"></script>
<script src="lib/impact-resolver.js"></script>
<script src="lib/why.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty;
  var id = new URLSearchParams(location.search).get('id');
  var qs = new URLSearchParams(location.search);
  var initLens = qs.get('lens');
  var initSort = qs.get('sort');
  var page = document.getElementById('devPage');
  // Never hang on the loading skeleton: a failed read renders an honest
  // "couldn't load" state with a retry (same contract as maps.html).
  var community = null, projects = [], facilities = [];
  try {
    community = await HS.data.community(S.zip);
    projects = await HS.data.projects(S.zip, home);        // DEVELOPMENT only (permits / planning)
    facilities = await HS.data.facilities(S.zip, home);    // EPA/ECHO regulated facilities — env context, own section
  } catch (e) {
    console.warn('[development] data load failed', e);
    page.innerHTML = '<div class="ph"><h1>We couldn\'t load this page</h1>'
      + '<p>Your connection may have dropped, or our data service is briefly unavailable. Nothing is wrong with your account.</p></div>'
      + '<button class="btn primary" onclick="location.reload()">Try again</button>';
    return;
  }

  // Phase-2 impact: join the per-document analyses (by source_ref) and resolve
  // every project through the ONE shared resolver. A failed analysis read still
  // resolves everything via the conservative metadata fallback — cards are
  // never blocked on impact analysis.
  try {
    var analyses = await HS.data.impactAnalyses(projects.map(function (p) { return p.source_ref; }));
    projects = HS.attachResolvedImpact(projects, analyses);
  } catch (e) {
    console.warn('[development] impact analyses load failed', e);
    projects = HS.attachResolvedImpact(projects, {});
  }

  if (id) { renderDetail(id); } else { renderList(); }

  function statusRank(s){ return s==='Proposed'?0:s==='Active'?1:2; }

  function renderList() {
    var state2 = {
      lens: HS.sanitizeLens ? HS.sanitizeLens(initLens) : 0,
      sort: HS.sanitizeSort ? HS.sanitizeSort(initSort) : 'impact',
      dataView: false
    };
    function sorted() {
      var a = projects.slice();
      if (state2.lens === 1) { // what's being built — group by type & stage
        a.sort(function(x,y){ return (x.type>y.type?1:x.type<y.type?-1:0) || (statusRank(x.status)-statusRank(y.status)); });
      } else if (state2.lens === 2 || state2.sort === 'distance') {
        a.sort(function(x,y){return (x.distance_mi||9e9)-(y.distance_mi||9e9);});
      } else if (state2.sort === 'newest') {
        a.sort(function(x,y){return new Date(y.submitted_at)-new Date(x.submitted_at);});
      } else {
        // "Impact on me" — shared comparator: resolved score desc, confidence
        // desc, distance asc, newest; document-grounded results outrank
        // similar-scoring metadata fallbacks (lib/impact-resolver.js).
        a.sort(HS.impactSortCompare);
      }
      return a;
    }
    function paint() {
      var a = sorted();
      var body;
      if (!a.length) {
        body = '<div class="card" style="text-align:center;padding:26px 18px">'
          + '<h3 style="margin-bottom:6px">Nothing on the public record near here yet</h3>'
          + '<p class="sowhat" style="margin:0">We check county and permit records for this area continuously — new projects appear here the moment they\'re filed.</p></div>';
      } else {
        body = state2.dataView ? dataTable(a) : ('<div class="devgrid">' + a.map(HS.tpl.devCard).join('') + '</div>');
      }
      page.innerHTML =
        '<div class="ph"><div class="eyebrow">Development</div><h1>What\'s being built — and how it impacts you</h1>'
        + '<p>Every active and proposed project near you, led by its effect on your daily life rather than its stage or unit count.</p></div>'
        + '<div class="lensnav">'
        + lens(0,'How could it affect me?','Impact-first · the default view')
        + lens(1,'What\'s being built?','The projects themselves')
        + lens(2,'Where are we growing?','The trajectory of the area')
        + '</div>'
        + '<div class="toolbar"><div class="seg" id="devSort">'
        + seg('impact','Impact on me') + seg('distance','Distance') + seg('newest','Newest')
        + '</div><div class="sp"></div>'
        + '<button class="fpill" id="devDataBtn">⊞ Table view</button></div>'
        + body
        + facSection();   // regulated facilities are appended in their OWN labeled section, never the dev list
      wire();
      // This page rebuilds its .ph dynamically, so re-run the shared header
      // context line (shell.js::HS.paintWhereLine) after each paint.
      if (HS.paintWhereLine) HS.paintWhereLine();
    }
    // Regulated facilities (EPA/ECHO) — environmental context, kept out of every
    // development / "what's being built" list above. Renders nothing when empty.
    function facSection() {
      if (!facilities || !facilities.length) return '';
      return '<div class="ph" style="margin-top:40px"><div class="eyebrow">Regulated facilities nearby</div>'
        + '<h2 style="margin-bottom:2px">EPA/ECHO-registered facilities near this ZIP</h2>'
        + '<p>EPA/ECHO-registered facilities near this ZIP — a factual public-record count, not development and not a verdict on any operator.</p></div>'
        + '<div class="devgrid">' + facilities.map(facCard).join('') + '</div>';
    }
    function facCard(f) {
      // Routes into the facility dossier (the interpreted panel) — the official ECHO/TCEQ
      // record links live THERE, so the dossier is the one EPA-link path (spec §3/§7).
      var interp = HS.fac.interpret(f.facility_env || null);
      return '<div class="card clickable" style="border-left-color:var(--ink-3)" onclick="location.href=\'development.html?id=' + encodeURIComponent(f.id) + '\'">'
        + '<span class="lens">' + HS.esc(f.type || 'Regulated facility') + (f.dist ? ' · ' + HS.esc(f.dist) : '') + '</span>'
        + '<h3>' + HS.esc(f.name) + '</h3>'
        + '<p class="sowhat">' + HS.esc(interp ? interp.line : 'Permit status not yet confirmed — open the facility record.') + '</p>'
        + '</div>';
    }
    function lens(i,q,d){ return '<button class="lenscard' + (state2.lens===i?' on':'') + '" data-lens="' + i + '"><span class="q">' + q + '</span><span class="d">' + d + '</span></button>'; }
    function seg(k,label){
      var on = !state2.dataView && (state2.lens === 2 ? (k === 'distance') : (state2.sort === k));
      return '<button class="' + (on ? 'on' : '') + '" data-sort="' + k + '">' + label + '</button>';
    }
    function dataTable(a){
      return '<table class="data-table"><thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Stage</th><th>Distance</th><th>Impact</th></tr></thead><tbody>'
        + a.map(function(p){ return '<tr onclick="location.href=\'development.html?id=' + p.id + '\'" onkeydown="if(event.key===\'Enter\')location.href=\'development.html?id=' + p.id + '\'" tabindex="0" style="cursor:pointer">'
          + '<td><b>' + HS.esc(p.name) + '</b></td><td>' + HS.esc(p.type) + '</td><td>' + HS.esc(p.status) + '</td>'
          + '<td>' + HS.esc(p.stage||'') + '</td><td>' + HS.esc(p.dist||'') + '</td><td>' + (p.impact_resolved ? (p.impact_resolved.score + '/100') : (p.impact_score||'')) + '</td></tr>'; }).join('')
        + '</tbody></table>';
    }
    function wire() {
      [].forEach.call(page.querySelectorAll('.lenscard'), function(b){ b.onclick=function(){ state2.lens=+b.dataset.lens; state2.dataView=false; paint(); }; });
      var ds = page.querySelector('#devSort'); if (ds) ds.onclick=function(e){ var b=e.target.closest('button[data-sort]'); if(!b)return; state2.sort=b.dataset.sort; state2.dataView=false; paint(); };
      var db = page.querySelector('#devDataBtn'); if (db) db.onclick=function(){ state2.dataView=!state2.dataView; paint(); };
    }
    paint();
  }

  function renderDetail(pid) {
    var p = projects.find(function(x){return x.id===pid;});
    // Facilities share this route/page but branch to their own dossier template —
    // a regulated facility is an EXISTING CONDITION, not development activity, so the
    // header/labels read "Regulated facility" throughout (spec §7).
    if (!p) {
      var f = facilities.find(function(x){return x.id===pid;});
      if (f) { renderFacility(f); return; }
    }
    if (!p) { page.innerHTML = '<button class="backbtn" onclick="location.href=\'development.html\'">← Back to development</button><div class="ph"><h1>We couldn\'t find that record</h1><p>It may have been removed from the county feed, or the link is out of date. Everything currently on record is on the development page.</p></div>'; return; }
    HS.data.meetings(S.zip, home).then(function (meetings) {
      var mtg = HS.bestMeeting(meetings, p.id);   // soonest UPCOMING first, else latest held
      // Timeline: only sourced milestones — filing date, record stage/status, or a
      // linked meeting. Never invent a future vote or expected date from status alone.
      var thread = [];
      if (p.submitted_at) {
        thread.push({
          date: HS.fmtDate(p.submitted_at, { year: 'numeric', month: 'long', day: 'numeric' }),
          title: 'Filed with the county',
          link: p.source_ref ? 'see the official record' : ''
        });
      }
      if (p.stage) {
        thread.push({
          date: p.status || (p.submitted_at ? HS.fmtDate(p.submitted_at, { month: 'long', day: 'numeric' }) : ''),
          title: p.stage
        });
      }
      if (mtg && mtg.starts_at) {
        var mtgDays = HS.daysUntil(mtg.starts_at);
        if (mtgDays != null && mtgDays >= 0) {
          thread.push({
            date: HS.fmtDate(mtg.starts_at, { year: 'numeric', month: 'long', day: 'numeric' }) + ' · in ' + mtgDays + ' day' + (mtgDays === 1 ? '' : 's'),
            title: 'Public hearing — comment window open',
            link: mtg.source_ref ? 'see the agenda' : '',
            future: true
          });
        } else {
          thread.push({
            date: HS.fmtDate(mtg.starts_at, { year: 'numeric', month: 'long', day: 'numeric' }),
            title: 'Public hearing — held',
            link: mtg.source_ref ? 'see the agenda' : ''
          });
        }
      }
      var threadBlock = thread.length
        ? '<div class="divider"></div><div class="kicker">The story so far — and what\'s next</div>'
          + '<div class="thread">' + HS.tpl.thread(thread) + '</div>'
        : '';

      var statusClass = p.status==='Active'?'active':p.status==='Approved'?'appr':'prop';
      // "Why this matters" (Sprint-3): four evidence-based answers + what the
      // record does and doesn't establish — shared backbone lib/why.js.
      var wd = HS.whyDerive(p, {
        hasHome: !!HS.realHome(),
        homeAddress: HS.realHome() ? home.address : null,
        place: community ? community.name : null,
        meeting: mtg
      });
      var dims = p.impact_dimensions || [];
      var hiDims = dims.filter(function(i){return i.bad;}).slice(0,2).map(function(i){return i.label.toLowerCase();});
      var goodDim = dims.find(function(i){return !i.bad;});
      var impactsBlock = dims.length
        ? '<div class="impacts">' + HS.tpl.impactChips(dims) + '</div>'
        : '';
      // Phase-2 impact analysis detail — category impacts, evidence (with page
      // refs), confidence, and how the score was computed. Document-grounded
      // when a Stage-1 extraction exists; otherwise the honest fallback note.
      var impactDetailBlock = '';
      var ir = p.impact_resolved;
      if (ir) {
        var lvl = ir.level.charAt(0).toUpperCase() + ir.level.slice(1);
        var dirW = ir.direction.charAt(0).toUpperCase() + ir.direction.slice(1);
        var catRows = (ir.categoryScores || []).map(function (c) {
          var tone = c.direction === 'positive' ? 'var(--green-2)' : c.direction === 'negative' ? 'var(--red)' : 'var(--amber)';
          return '<div class="sb"><div class="sl"><span>' + HS.esc(c.category) + '</span><b>' + c.magnitude + ' · ' + HS.esc(c.direction) + '</b></div>'
            + '<div class="track"><div class="fill" style="width:' + c.magnitude + '%;background:' + tone + '"></div></div></div>';
        }).join('');
        var quoteEv = (ir.evidence || []).filter(function (e) { return e.fact === 'quote'; });
        var factEv = (ir.evidence || []).filter(function (e) { return e.fact !== 'quote'; }).slice(0, 10);
        var evRows = factEv.map(function (e) {
          return '<div class="row"><span>' + HS.esc(e.category) + '</span><b>' + HS.esc(e.fact + ': ' + e.value) + '</b></div>';
        }).join('');
        var quoteRows = quoteEv.slice(0, 6).map(function (q) {
          return '<p class="sowhat" style="font-style:italic;margin-bottom:6px">“' + HS.esc(q.value) + '”'
            + (q.page != null ? ' <span style="color:var(--ink-3)">(p. ' + HS.esc(q.page) + ')</span>' : '') + '</p>';
        }).join('');
        var basisNote = ir.basis === 'document'
          ? 'Derived from the official filing linked below.'
          : 'The filing hasn\'t been analyzed yet — this is a conservative estimate from the record\'s own metadata only.';
        impactDetailBlock =
          '<div class="divider"></div><div class="kicker">Impact analysis</div>'
          + '<p class="sowhat" style="margin-bottom:8px"><span class="ibadge ' + HS.esc(ir.level) + '">' + HS.esc(lvl) + ' · ' + ir.score + '/100</span>'
          + '<span class="idir ' + HS.esc(ir.direction) + '">' + HS.esc(dirW) + '</span>'
          + ' <span style="color:var(--ink-3)">· confidence ' + Math.round((ir.confidence || 0) * 100) + '%</span></p>'
          + '<p class="impactsentence">' + HS.esc(ir.sentence) + '</p>'
          + (catRows ? '<div style="margin:10px 0 4px">' + catRows + '</div>' : '')
          + (evRows ? '<div class="kicker" style="margin-top:12px">Evidence from the record</div><div class="specs">' + evRows + '</div>' : '')
          + quoteRows
          + '<p style="font-size:11px;color:var(--ink-3);margin:10px 0 0">' + basisNote
          + ' Score = strongest documented effects × distance (base ' + (ir.factors && ir.factors.base) + ', distance weight '
          + (ir.factors && ir.factors.distanceWeight) + ') · ' + HS.esc(ir.version)
          + '. The score measures how much daily life nearby could change — direction says which way.</p>';
      }
      page.innerHTML =
        '<button class="backbtn" onclick="location.href=\'development.html\'">← Back to development</button>'
        + '<div class="ph" style="margin-bottom:16px"><div class="eyebrow" style="display:flex;align-items:center;gap:10px">' + HS.esc(p.name) + ' <span class="status ' + statusClass + '">' + HS.esc(p.status) + '</span></div><h1 style="margin-bottom:2px">How this affects you</h1></div>'
        + '<div class="detail"><div class="panel">'
        + '<div class="kicker">The bottom line</div>'
        + (hiDims.length
            ? '<div class="verdict">Likely to <span class="hl">affect ' + HS.esc(hiDims.join(' and ')) + '</span> near you'
              + (goodDim ? ' — with a <span class="hlg">lift to ' + HS.esc(goodDim.label.toLowerCase()) + '</span>' : '') + '.</div>'
            : '<div class="verdict">' + HS.esc(p.sowhat || 'On the county\'s public record near you — the record below has the specifics.') + '</div>')
        + impactsBlock
        + impactDetailBlock
        + '<div class="divider"></div><div class="kicker">Why this matters</div>' + HS.whyQaHTML(wd)
        + '<div class="divider"></div><div class="kicker">What we know</div>' + HS.whyKnowHTML(wd)
        + '<div class="divider"></div><div class="kicker">What we don\'t know yet</div>' + HS.whyUnknownHTML(wd)
        + threadBlock + '</div>'
        + '<div class="panel side"><div class="kicker">What you can do</div><div class="doact">'
        + '<button class="btn primary" onclick="window.open(\'' + HS.esc(p.source_ref) + '\',\'_blank\',\'noopener\')">Submit a public comment</button>'
        + '<button class="btn" onclick="HS.addToCalendar(\'' + p.id + '\')">Add hearing to calendar</button>'
        + '<button class="btn" onclick="window.open(\'' + HS.esc(p.source_ref) + '\',\'_blank\',\'noopener\')">Read the official record</button>'
        + '<button class="btn" onclick="location.href=\'' + HS.esc(HS.navHref('maps.html', S.zip)) + '\'">See it on the map</button>'
        + '<button class="btn ghost" onclick="HS.toggleFollow(this,\'project\',\'' + p.id + '\')">Follow this project</button></div>'
        + '<div class="divider"></div><div class="kicker">The specs</div><div class="specs">'
        + specRow('Developer', p.developer) + specRow('Size', p.size) + specRow('Investment', p.investment)
        + specRow('Jobs created', p.jobs) + specRow('Distance', p.dist) + specRow('Status', p.stage)
        + '</div>' + (p.approx ? '<p style="font-size:11.5px;color:var(--ink-2);margin:12px 0 0">Some details are still preliminary while county records sync — the official record is the source of truth.</p>' : '') + '</div></div>';
    });
  }
  // Facility dossier (spec §7) — Identity / Interpreted status / Permit history /
  // Enforcement & compliance / Source. Every rendered field traces to the materialized
  // ECHO/TCEQ record (app_projects.registry_id + facility_env); absent stays absent and
  // is SAID to be absent, never guessed. Enforcement zeros render as a positive signal
  // ONLY while compliance tracking is on (§5) — otherwise the tracking-off caveat shows.
  function renderFacility(f) {
    var fenv = f.facility_env || null;
    var interp = HS.fac.interpret(fenv);
    var sigs = HS.fac.signals(fenv);
    var links = HS.fac.links(f);
    var permits = (fenv && fenv.epa && fenv.epa.permits) || [];
    var statutes = permits.map(function(pm){ return pm.statute; }).filter(Boolean)
      .filter(function(s, i, a){ return a.indexOf(s) === i; });

    var statusHtml = interp
      ? '<div class="verdict">' + HS.esc(interp.line) + '</div>'
        + (interp.caveat ? '<p class="sowhat" style="font-style:italic">' + HS.esc(interp.caveat) + '</p>' : '')
      : '<div class="verdict">Permit status not yet confirmed for this facility.</div>'
        + '<p class="sowhat">EPA lists this facility in its registry, but its permit status isn\'t in our archived record yet — see the official source below.</p>';

    var permitsHtml = permits.length
      ? permits.map(function(pm){
          var bits = [pm.npdes_id, pm.type, pm.status].filter(Boolean).map(HS.esc);
          return '<div class="row"><span>' + HS.esc(pm.statute || 'Permit') + '</span><b>' + bits.join(' · ') + '</b></div>';
        }).join('')
      : '<p class="sowhat">No individual permit records in the archived report.</p>';

    var enfHtml = sigs.length
      ? sigs.map(function(g){ return '<div class="row"><span>' + (g.tone === 'alert' ? '⚠' : g.tone === 'watch' ? '◔' : '·') + '</span><b>' + HS.esc(g.text) + '</b></div>'; }).join('')
      : (interp && interp.tracking === false
          ? '<p class="sowhat">' + HS.esc(interp.caveat) + '</p>'
          : '<p class="sowhat">No enforcement or compliance entries in the archived record.</p>');

    var linksHtml = links.map(function(l){
      return '<button class="btn' + (links[0] === l ? ' primary' : '') + '" onclick="window.open(\'' + HS.esc(l.url) + '\',\'_blank\',\'noopener\')">' + HS.esc(l.label) + '</button>';
    }).join('');

    page.innerHTML =
      '<button class="backbtn" onclick="location.href=\'development.html\'">← Back to development</button>'
      + '<div class="ph" style="margin-bottom:16px"><div class="eyebrow" style="display:flex;align-items:center;gap:10px">Regulated facility <span class="status active">Operating</span></div>'
      + '<h1 style="margin-bottom:2px">' + HS.esc(f.name) + '</h1>'
      + '<p style="margin:6px 0 0">An existing regulated facility on the public record — environmental context, not development activity.</p></div>'
      + '<div class="detail"><div class="panel">'
      + '<div class="kicker">Interpreted status</div>'
      + statusHtml
      + '<div class="divider"></div><div class="kicker">Permit history</div><div class="specs">' + permitsHtml + '</div>'
      + '<div class="divider"></div><div class="kicker">Enforcement & compliance</div><div class="specs">' + enfHtml + '</div>'
      + '<p style="font-size:11px;color:var(--ink-3);margin:12px 0 0">Environmental records are geo-matched to this facility, not to a specific parcel. A factual public-record summary — not a verdict on any operator.</p>'
      + '</div>'
      + '<div class="panel side"><div class="kicker">Identity</div><div class="specs">'
      + specRow('Facility', f.name) + specRow('Type', f.type)
      + specRow('FRS Registry ID', f.registry_id)
      + specRow('Statutes', statutes.join(', '))
      + specRow('TCEQ RN', fenv && fenv.tceq_rn)
      + specRow('Registry', f.developer) + specRow('Distance', f.dist)
      + '</div>'
      + '<div class="divider"></div><div class="kicker">Source — official records</div><div class="doact">' + linksHtml + '</div>'
      + '</div></div>';
  }
  function specRow(k,v){ return '<div class="row"><span>' + HS.esc(k) + '</span><b>' + HS.esc(v||'—') + '</b></div>'; }
});

// simple .ics generator for "Add hearing to calendar"
HS.addToCalendar = async function (projectId) {
  var meetings = await HS.data.meetings(HS.state.zip, HS.state.activeProperty);
  var m = meetings.find(function(x){return x.related_project_id===projectId;}) || meetings[0];
  if (!m) return;
  function z(d){ return new Date(d).toISOString().replace(/[-:]/g,'').replace(/\.\d+/,''); }
  var ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//HomeSignal//EN','BEGIN:VEVENT',
    'UID:' + m.id + '@homesignal','DTSTART:' + z(m.starts_at),'SUMMARY:' + m.title,
    'LOCATION:' + (m.location||''),'DESCRIPTION:' + (m.source_ref||''),'END:VEVENT','END:VCALENDAR'].join('\r\n');
  var a = document.createElement('a');
  a.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
  a.download = (m.title||'hearing').replace(/\W+/g,'-') + '.ics'; a.click();
};
</script>
</body>
</html>
