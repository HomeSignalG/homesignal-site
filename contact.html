<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Contact</div>
      <h1>Get in touch</h1>
      <p>Questions, feedback, or a community you'd like us to add? We'd love to hear from you.</p>
    </div>
    <div class="cols">
      <div>
        <div class="block">
          <h2 class="bt">Send us a message</h2>
          <p style="font-size:13.5px;color:var(--ink-2);margin:0 0 16px">Email us directly at <a href="mailto:hello@homesignal.net" style="color:var(--green);font-weight:600;text-decoration:none">hello@homesignal.net</a>, or use the form below.</p>
          <div id="contactForm" style="display:flex;flex-direction:column;gap:10px">
            <input class="cinput" id="cName" placeholder="Your name">
            <input class="cinput" id="cEmail" type="email" placeholder="Your email">
            <textarea class="cinput" id="cMsg" placeholder="Your message" style="min-height:120px;resize:vertical"></textarea>
            <button class="mbtn" style="align-self:flex-start" onclick="sendContact()">Send message</button>
          </div>
          <div id="contactDone" class="cnote hidden">✓ Thanks — your message is on its way. We'll reply to your email shortly.</div>
        </div>
      </div>
      <div>
        <div class="block">
          <h2 class="bt">Other ways to reach us</h2>
          <div class="vital"><span class="vl">Email</span><span class="vv" style="font-size:13px">hello@homesignal.net</span></div>
          <div class="vital"><span class="vl">Follow</span><span class="vv" style="display:inline-flex;gap:8px;align-items:center">
            <a href="https://bsky.app/profile/homesignal-tracker.bsky.social" target="_blank" rel="noopener" aria-label="HomeSignal on Bluesky" title="Bluesky" style="display:inline-flex;width:30px;height:30px;border-radius:50%;background:#1185fe;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="16" height="16" fill="#fff" aria-hidden="true"><path d="M5.5 4.3c2.4 1.8 5 5.5 6 7.5 1-2 3.6-5.7 6-7.5 1.7-1.3 4.5-2.3 4.5.9 0 .6-.4 5.2-.6 6-.7 2.6-3.3 3.2-5.7 2.8 4.1.7 5.2 3 2.9 5.3-4.3 4.4-6.2-1.1-6.7-2.5-.1-.3-.2-.5-.2-.3 0-.2-.1.1-.2 2.5-.5 1.4-2.4 6.9-6.7 2.5-2.3-2.3-1.2-4.6 2.9-5.3-2.4.4-5-.2-5.7-2.8C1.4 10.4 1 5.8 1 5.2c0-3.2 2.8-2.2 4.5-.9z"/></svg></a>
            <a href="https://www.reddit.com/user/HomeSignalnet" target="_blank" rel="noopener" aria-label="HomeSignal on Reddit" title="Reddit" style="display:inline-flex;width:30px;height:30px;border-radius:50%;background:#ff4500;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="16" height="16" fill="#fff" aria-hidden="true"><path d="M22 12a2.04 2.04 0 0 0-3.46-1.46 10 10 0 0 0-5.27-1.67l.9-4.23 2.94.62a1.5 1.5 0 1 0 .16-1l-3.28-.7a.5.5 0 0 0-.59.38l-1 4.7a10 10 0 0 0-5.34 1.66 2.04 2.04 0 1 0-2.2 3.36c-.03.21-.05.43-.05.65 0 3.31 3.58 6 8 6s8-2.69 8-6c0-.22-.02-.44-.05-.65A2.04 2.04 0 0 0 22 12zM7 13.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0zm8.1 4.2c-.86.86-2.6.93-3.1.93-.5 0-2.24-.07-3.1-.93a.34.34 0 0 1 .48-.48c.54.54 1.7.73 2.62.73.92 0 2.08-.19 2.62-.73a.34.34 0 0 1 .48.48zM15.5 15a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></a>
          </span></div>
        </div>
        <div class="block">
          <h2 class="bt">Request a community</h2>
          <p style="font-size:13px;color:var(--ink-2);margin:0 0 13px">Don't see your area yet? Add your ZIP and we'll notify you the moment HomeSignal goes live there.</p>
          <button class="inlinebtn" onclick="HS.openLoc()">◉ Add your ZIP →</button>
        </div>
        <div class="block">
          <h2 class="bt">Neutral · sourced · non-partisan</h2>
          <p style="font-size:13px;color:var(--ink-2);margin:0">Everything HomeSignal shows is drawn from public records. We don't take positions — we help you see what's changing and decide for yourself.</p>
        </div>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/templates.js"></script>
<script src="shell.js"></script>
<script>
async function sendContact() {
  var el = document.getElementById('cEmail');
  if (!el.value.trim() || el.value.indexOf('@') < 1) { el.style.borderColor='#c23b34'; el.focus(); return; }
  var row = { name: document.getElementById('cName').value.trim(), email: el.value.trim(), message: document.getElementById('cMsg').value.trim() };
  if (HS_CONFIG.DATA_SOURCE === 'supabase' && window.supabase) {
    try { await HS.sb().from('contact_messages').insert(row); } catch (e) { console.warn(e); }
  }
  document.getElementById('contactForm').classList.add('hidden');
  document.getElementById('contactDone').classList.remove('hidden');
}
</script>
