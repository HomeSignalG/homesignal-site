      <div class="eyebrow">About</div>
      <h1>Early warning for homeowners.</h1>
      <p>HomeSignal brings permit filings, government public notices, and local news into one feed, so residents learn what is coming to their community before decisions are finalized.</p>
    </div>
    <div class="block prose" style="max-width:840px">
      <p>Major changes near a home — a data center, a rezoning, a new transmission line — usually appear in public records and meeting agendas long before they make the news. By then, the public comment window may have closed. HomeSignal surfaces those signals early, in plain language, so people have time to understand them and participate.</p>

      <h2 class="bt">What we do</h2>
      <p>We monitor official sources for a community and group what we find into two kinds of alerts: early-warning items that give advance notice before a vote or decision, and informational items that keep you up to date on news, emerging technologies, and how other places handle similar issues.</p>

      <h2 class="bt">Our approach</h2>
      <p>HomeSignal presents neutral, fact-based information drawn from public records and official filings. We aim to inform participation, not to take sides.</p>

      <div class="cnote"><b>Neutral · sourced · non-partisan.</b> Everything HomeSignal shows is drawn from public records. We don't take positions — we help you see what's changing and decide for yourself.</div>
    </div>
