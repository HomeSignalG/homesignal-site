<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Alerts</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co; form-action 'self'">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="alerts">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Alerts</div>
      <h1>What needs your attention near home</h1>
      <p id="alSub">Government notices, meetings, and local news for your area.</p>
    </div>
    <div class="strip" id="alStrip"></div>

    <div class="topicsec">
      <div class="th"><h2>Your alert topics — choose what you're notified about</h2><span style="font-size:12px;color:var(--ink-3)">Controls what you see here and what gets emailed</span></div>
      <div class="tcats">
        <button class="tcat" onclick="HS.openTopics('gov')"><div class="ci" style="background:var(--red)">▤</div><h4>Government Notices</h4><div class="cc" id="cc-gov">—</div><div class="cd">click to change</div></button>
        <button class="tcat" onclick="HS.openTopics('meetings')"><div class="ci" style="background:var(--amber)">▦</div><h4>Upcoming Meetings</h4><div class="cc" id="cc-meetings">—</div><div class="cd">click to change</div></button>
        <button class="tcat" onclick="HS.openTopics('news')"><div class="ci" style="background:var(--blue)">✉</div><h4>Local News</h4><div class="cc" id="cc-news">—</div><div class="cd">click to change</div></button>
      </div>
    </div>

    <div class="toolbar">
      <div class="seg" id="alFilter">
        <button class="on" data-tab="gov">Government Notices</button>
        <button data-tab="meetings">Upcoming Meetings</button>
        <button data-tab="news">Local News</button>
      </div>
      <div class="sp"></div>
      <label class="sortctl" for="alSortSelect">Sort:
        <select id="alSortSelect" aria-label="Sort alerts">
          <option value="urgency" selected>By urgency</option>
          <option value="date">By date</option>
          <option value="distance">By distance</option>
        </select>
      </label>
    </div>

    <div id="alBand"></div>
    <div id="alGroups"></div>
    <div id="alQuiet"></div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/topic-prefs.js"></script>
<script src="lib/templates.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty;
  var qs = new URLSearchParams(location.search);
  var focusBand = qs.get('band');
  var focusCategory = qs.get('category');
  var focusId = qs.get('id');
  // Never hang silently: a failed read renders an honest retry state.
  var c, all, meetings;
  try {
    c = await HS.data.community(S.zip);
    all = await HS.data.changes(S.zip, home);
    meetings = await HS.data.meetings(S.zip, home);
  } catch (e) {
    console.warn('[alerts] data load failed', e);
    document.querySelector('.page').innerHTML = '<div class="ph"><h1>We couldn\'t load your alerts</h1>'
      + '<p>Your connection may have dropped, or our data service is briefly unavailable.</p></div>'
      + '<button class="btn primary" onclick="location.reload()">Try again</button>';
    return;
  }

  // topic counts — state.topicPrefs was hydrated from server (signed-in) or LS (anonymous) in boot()
  HS.paintTopicCounts();

  var newsTopics = (HS.data.topicCategories().news && HS.data.topicCategories().news.items) || [];

  function isMeetingMirror(ch) {
    return /^Public meeting\s*[—–-]/i.test(ch.title || '');
  }
  function isNewsItem(ch) {
    var cat = ch.category || '';
    return newsTopics.indexOf(cat) !== -1 || /news/i.test(cat);
  }
  function isGovNotice(ch) {
    if (isMeetingMirror(ch) || isNewsItem(ch)) return false;
    return /planning|government|civic/i.test(ch.category || '')
      || /^Government notice/i.test(ch.plain_language || '');
  }
  function meetingAsChange(m) {
    var when = m.starts_at ? HS.fmtDate(m.starts_at) : '';
    return {
      id: m.id,
      category: m.category || 'Upcoming Meetings',
      title: m.title || m.body,
      plain_language: 'Public meeting' + (when ? ' on ' + when : '') + (m.location ? ' at ' + m.location : '') + '.',
      occurred_at: m.starts_at,
      window_closes_at: m.window_closes_at || m.starts_at,
      source_ref: m.source_ref,
      related_project_id: m.related_project_id,
      lens: 'safety',
      impacts: [],
      distance_mi: m.distance_mi,
      dist: m.dist
    };
  }
  function dedupeMeetings(items) {
    var seen = {}, out = [];
    items.forEach(function (it) {
      var key = (it.source_ref || '') + '|' + (it.title || '') + '|' + String(it.occurred_at || it.window_closes_at || '');
      if (seen[key]) return;
      seen[key] = 1;
      out.push(it);
    });
    return out;
  }
  function buildMeetingsPool() {
    var fromApi = meetings.map(meetingAsChange);
    var fromChanges = all.filter(isMeetingMirror).map(function (ch) {
      return Object.assign({}, ch, { category: ch.category || 'Upcoming Meetings' });
    });
    return dedupeMeetings(fromApi.concat(fromChanges));
  }

  var pools = {
    gov: all.filter(isGovNotice),
    news: all.filter(isNewsItem),
    meetings: buildMeetingsPool()
  };

  function resolveTab(cat) {
    if (!cat) return 'gov';
    var key = String(cat).toLowerCase();
    if (key === 'gov' || key === 'government notices' || key === 'notices') return 'gov';
    if (key === 'meetings' || key === 'upcoming meetings') return 'meetings';
    if (key === 'news' || key === 'local news') return 'news';
  // Legacy deep links used QoL group names (e.g. Government & civic) — route to gov tab.
    if (/planning|government|civic/i.test(cat)) return 'gov';
    return 'gov';
  }

  var state = { tab: resolveTab(focusCategory), sort: 'urgency' };
  // When the default tab is empty but another feed has records, land on the first
  // non-empty tab (unless a category deep link explicitly chose the tab).
  if (!focusCategory && !pools[state.tab].length) {
    ['gov', 'meetings', 'news'].some(function (k) {
      if (pools[k].length) { state.tab = k; return true; }
    });
  }

  function itemsForTab(tab) { return pools[tab] || pools.gov; }

  var TAB_EMPTY = {
    gov: 'No government notices on file for this ZIP yet — check Upcoming Meetings for public hearings and agendas.',
    meetings: 'No upcoming public meetings on file for this ZIP yet.',
    news: 'No local news items on file for this ZIP yet.'
  };

  function paintStrip(items) {
    var open = items.filter(function (x) { var d = HS.daysUntil(x.window_closes_at); return d != null && d >= 0; });
    var rest = items.filter(function (x) { return open.indexOf(x) < 0 && !x.quiet; });
    var nearest = items.slice().sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);})[0];
    document.getElementById('alStrip').innerHTML =
      HS.tpl.statTile(open.length, 'Need you soon — windows closing', 'accent')
      + HS.tpl.statTile(rest.length + open.length, 'In this category', '')
      + (c && c.value_trend != null ? HS.tpl.statTile(HS.trend(c.value_trend), 'Your value outlook, next 12 mo', 'g') : '')
      + HS.tpl.statTile((nearest && nearest.dist ? nearest.dist.replace(' mi','') : '—') + '<span style="font-size:14px;font-weight:600;color:var(--ink-3)">mi</span>', 'Nearest in category', '');
    return { open: open, rest: rest, quiet: items.filter(function (x) { return x.quiet; }) };
  }

  function sortItems(items, mode, tab) {
    var a = items.slice();
    if (mode === 'distance') {
      a.sort(function(x,y){return (x.distance_mi||9e9)-(y.distance_mi||9e9);});
    } else if (mode === 'date') {
      a.sort(function(x,y){return new Date(y.occurred_at||0)-new Date(x.occurred_at||0);});
    } else if (tab === 'meetings') {
      a.sort(function(x,y){return new Date(x.occurred_at||0)-new Date(y.occurred_at||0);});
    } else {
      a.sort(function(x,y){return (y.impacts?y.impacts.length:0)-(x.impacts?x.impacts.length:0);});
    }
    return a;
  }

  function render() {
    var items = itemsForTab(state.tab);
    var buckets = paintStrip(items);
    var open = buckets.open, rest = buckets.rest, quiet = buckets.quiet;
    var mode = state.sort, tab = state.tab;

    document.getElementById('alBand').innerHTML = open.length ? (
      '<div class="band"><div class="band-h"><span class="lab"><span class="dotb"></span>Needs you soon</span>'
      + '<span class="cnt">Action still changes the outcome</span></div>'
      + sortItems(open, mode, tab).map(function(ch){ return HS.tpl.storyCard(ch).replace('class="card"','class="card inband"'); }).join('')
      + '</div>') : '';

    var groups = {};
    sortItems(rest, mode, tab).forEach(function (ch) { (groups[ch.category] = groups[ch.category] || []).push(ch); });
    var dotColor = { 'Traffic & getting around':'traffic','Home value & cost of living':'value','Environment & utilities':'water','Government & civic':'safety','Development':'traffic','Planning & zoning':'traffic','Upcoming Meetings':'safety' };
    var groupKeys = Object.keys(groups);
    document.getElementById('alGroups').innerHTML = groupKeys.length ? groupKeys.map(function (g) {
      var col = dotColor[g] || 'traffic';
      return '<div class="groupHead" data-category="' + HS.esc(g) + '"><span class="gd ' + col + '"></span> ' + HS.esc(g)
        + ' <span class="gc">— ' + groups[g].length + ' change' + (groups[g].length===1?'':'s') + '</span></div>'
        + groups[g].map(function(ch){ return HS.tpl.storyCard(ch); }).join('');
    }).join('') : (!open.length && !quiet.length
      ? '<div class="quiet" style="margin-top:4px"><b>Nothing in this category right now.</b> ' + HS.esc(TAB_EMPTY[tab] || '') + '</div>'
      : '');

    document.getElementById('alQuiet').innerHTML = quiet.length ? (
      '<div class="groupHead" style="color:var(--ink-3)"><span class="gd" style="background:var(--line)"></span> Good to know · lower relevance to you</div>'
      + '<div class="quiet">' + quiet.map(function(q){return '<b>' + HS.esc(q.title) + '</b>';}).join(' · ')
      + '. &nbsp;Kept out of the main list because they\'re unlikely to affect your home.</div>') : '';

    [].forEach.call(document.getElementById('alFilter').querySelectorAll('button'), function (b) {
      b.classList.toggle('on', b.dataset.tab === state.tab);
    });
    document.getElementById('alSortSelect').value = state.sort;
  }

  render();
  applyFocus();

  document.getElementById('alFilter').addEventListener('click', function (e) {
    var b = e.target.closest('button[data-tab]'); if (!b) return;
    state.tab = b.dataset.tab;
    render();
  });
  document.getElementById('alSortSelect').addEventListener('change', function () {
    state.sort = this.value;
    render();
  });

  // Deep-link focus from Dashboard (band=open, category=..., id=...).
  function applyFocus() {
    var target = null;
    if (focusId) {
      var cards = document.querySelectorAll('[data-alert-id]');
      for (var j = 0; j < cards.length; j++) {
        if (cards[j].getAttribute('data-alert-id') === focusId) { target = cards[j]; break; }
      }
    }
    if (!target && focusBand === 'open') {
      target = document.getElementById('alBand');
    }
    if (!target && focusCategory) {
      var heads = document.querySelectorAll('.groupHead[data-category]');
      for (var i = 0; i < heads.length; i++) {
        if (heads[i].getAttribute('data-category') === focusCategory) { target = heads[i]; break; }
      }
    }
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (focusId && target.classList && target.classList.contains('card')) {
        target.style.boxShadow = '0 0 0 2px var(--green)';
        setTimeout(function () { target.style.boxShadow = ''; }, 2400);
      }
    }
  }
});
</script>
</body>
</html>
