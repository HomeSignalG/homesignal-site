<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Today's Priorities</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co; form-action 'self'">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="today">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Today's Priorities</div>
      <h1 id="tdGreeting">Here's what needs you</h1>
      <p id="tdSub"></p>
    </div>
    <div class="cols">
      <div>
        <div class="block">
          <div class="bt-row"><h2>Needs you this week</h2><a href="alerts.html">All alerts →</a></div>
          <div id="tdPriorities"></div>
        </div>
        <div class="block">
          <h2 class="bt">Your briefing</h2>
          <p class="brief" id="tdBrief"></p>
        </div>
      </div>
      <div>
        <div class="block">
          <h2 class="bt">Your vitals</h2>
          <div style="display:flex;align-items:center;gap:15px;margin-bottom:12px">
            <div id="tdRing"></div>
            <div><div style="font-size:13px;color:var(--ink-2)">Community score</div><div style="font-size:13px;color:var(--green);font-weight:700" id="tdScoreTrend"></div></div>
          </div>
          <div id="tdVitals"></div>
          <div class="scorebars" id="tdBars"></div>
          <p style="font-size:11px;color:var(--ink-3);margin:8px 0 0">Based on the public data sources we track for this area.</p>
        </div>
        <div class="block">
          <div class="bt-row"><h2>Action windows</h2><a href="maps.html">Map →</a></div>
          <div id="tdWindows"></div>
        </div>
        <div class="p2">
          <div class="p2h"><span>🔒</span> Coming soon</div>
          <div class="p2sub">More ways HomeSignal will look out for your home.</div>
          <div class="p2i"><div style="flex:1"><div class="t">Opportunity Center</div><div class="d">Tax exemptions, rebates, grants, insurance savings</div></div></div>
          <div class="p2i"><div style="flex:1"><div class="t">Financial Intelligence</div><div class="d">Total cost of ownership, equity timeline</div></div></div>
          <div class="p2i"><div style="flex:1"><div class="t">Home Document Vault</div><div class="d">Deeds, permits, warranties, policies</div></div></div>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/templates.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty;
  var c = await HS.data.community(S.zip);
  var changes = await HS.data.changes(S.zip, home);
  var meetings = await HS.data.meetings(S.zip, home);

  // greeting
  var name = S.session && S.session.name ? S.session.name.split(' ')[0] : '';
  var today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  var hr = new Date().getHours();
  var daypart = hr < 12 ? 'Good morning' : hr < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('tdGreeting').textContent = daypart + (name ? ', ' + name : '') + ' — here’s what needs you';
  // When the visitor has not chosen their own area we are showing the default
  // prototype community as an example, so flag it as a sample zip in the dateline.
  var sampleTag = (HS.isSample && HS.isSample()) ? ' — (Sample Zip Code)' : '';
  document.getElementById('tdSub').textContent = today + ' · ' + c.name + sampleTag + '.';

  // priorities: rank by impact, prefer open windows
  var ranked = changes.slice().sort(function (a, b) {
    var aw = HS.daysUntil(a.window_closes_at), bw = HS.daysUntil(b.window_closes_at);
    var ao = (aw != null && aw >= 0) ? 1 : 0, bo = (bw != null && bw >= 0) ? 1 : 0;
    if (ao !== bo) return bo - ao;
    return (b.impacts ? b.impacts.length : 0) - (a.impacts ? a.impacts.length : 0);
  }).filter(function (c) { return !c.quiet; }).slice(0, 3);

  document.getElementById('tdPriorities').innerHTML = ranked.map(function (ch) {
    var d = HS.daysUntil(ch.window_closes_at);
    var open = d != null && d >= 0;
    var pk = open ? 'var(--red)' : 'var(--amber)';
    var win = open ? '<span class="win">◔ Window closes in ' + d + ' day' + (d===1?'':'s') + '</span>'
                   : (ch.beat ? '<span style="color:var(--ink-3)">' + HS.esc(ch.beat) + '</span>' : '');
    var href = ch.related_project_id ? "development.html?id=" + ch.related_project_id : (ch.source_ref || 'alerts.html');
    return '<div class="prow"><span class="pk" style="background:' + pk + '"></span>'
      + '<div class="pmain"><div class="pt">' + HS.esc(ch.title) + '</div>'
      + '<div class="pd">' + HS.esc(ch.plain_language) + '</div>'
      + '<div class="pmeta">' + win + (ch.dist ? '<span style="color:var(--ink-2);font-weight:600">' + HS.esc(ch.dist) + '</span>' : '') + '</div></div>'
      + '<button class="btn ' + (open ? 'primary' : '') + '" onclick="window.open(\'' + href + '\',\'_self\')">' + (open ? 'Act' : 'View') + '</button></div>';
  }).join('');

  // briefing
  var top = ranked[0];
  document.getElementById('tdBrief').innerHTML =
    'There are <b>' + changes.filter(function(c){return !c.quiet;}).length + ' changes</b> near you this week. '
    + (top ? 'The biggest is the <span class="hl">' + HS.esc(top.title) + '</span> — ' + HS.esc(top.plain_language) + ' ' : '')
    + (c.value_trend != null ? 'Your <span class="hl">value outlook · ' + HS.trend(c.value_trend) + ' over the next 12 months.</span>' : '');

  // vitals + bars
  document.getElementById('tdRing').innerHTML = HS.tpl.scoreRing(c.community_score);
  document.getElementById('tdScoreTrend').textContent = c.growth_pressure ? 'Growth pressure: ' + c.growth_pressure : '';
  document.getElementById('tdVitals').innerHTML =
    (c.value_trend != null ? '<div class="vital"><span class="vl">Value outlook · 12 mo</span><span class="vv" style="color:var(--green)">' + HS.trend(c.value_trend) + '</span></div>' : '')
    + '<div class="vital"><span class="vl">Projects tracked</span><span class="vv">' + (await HS.data.projects(S.zip, home)).length + '</span></div>'
    + '<div class="vital"><span class="vl">Active alerts</span><span class="vv">' + changes.filter(function(c){return HS.daysUntil(c.window_closes_at)>=0 || !c.quiet;}).length + '</span></div>'
    + '<div class="vital"><span class="vl">Growth pressure</span><span class="vv" style="color:var(--amber)">' + HS.esc(c.growth_pressure) + '</span></div>';
  document.getElementById('tdBars').innerHTML = HS.tpl.scoreBars(c.component_scores);

  // action windows
  document.getElementById('tdWindows').innerHTML = meetings.map(HS.tpl.meetingRow).join('');
});
</script>
</body>
</html>
