<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Maps</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://server.arcgisonline.com; font-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src blob:; child-src blob:; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co https://server.arcgisonline.com https://*.tile.openstreetmap.org; form-action 'self'">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
  /* app-only: real MapLibre tile map (Esri/OSM) is the default; the schematic SVG
     sits beneath it as the offline / rate-limit fallback, with a shared overlay panel */
  #mapWrap{min-height:300px}
  #mapgl{width:100%;height:520px;border-radius:15px;overflow:hidden}
  @media(max-width:900px){ #mapgl{height:60vw;min-height:320px} }
  .maplibregl-popup-content{font-family:var(--font);font-size:13px;border-radius:10px;padding:9px 12px}
</style>
</head>
<body data-nav="maps">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Maps</div>
      <h1>What's changing around you</h1>
      <p>Every project and alert near your home, placed on the map and colored by the part of life it touches — not by project type.</p>
    </div>
    <div class="toolbar">
      <div class="seg" id="mapMode">
        <button class="on" data-mode="impact">Impact</button>
        <button data-mode="satellite">Satellite</button>
        <button data-mode="street">Street</button>
      </div>
      <div class="sp"></div>
      <button class="fpill" id="radiusPill">◉ Impact radius: 1.5 mi ▾</button>
      <button class="fpill">All dimensions ▾</button>
    </div>
    <div class="mapcols">
      <div class="mapwrap" id="mapWrap">
        <div id="mapSch"></div>
        <div id="mapgl" style="display:none"></div>
        <div class="mpanel">
          <div class="mt">Pins colored by impact</div>
          <div class="legrow"><span class="ld" style="background:var(--red)"></span> High impact on you</div>
          <div class="legrow"><span class="ld" style="background:var(--amber)"></span> Moderate impact</div>
          <div class="legrow"><span class="ld" style="background:var(--blue)"></span> Watch / minor</div>
          <div class="legrow"><span class="ld" style="background:var(--green-2)"></span> Positive / distant</div>
          <div class="legrow" id="legFacility" style="display:none"><span class="ld" style="background:#6f42c1;border-radius:2px"></span> Regulated facility</div>
          <div class="layers">
            <div class="mt">Layers</div>
            <div class="lyr" id="lyrProjects"><span>Projects</span><span class="tg"></span></div>
            <div class="lyr" id="lyrFacilities" style="display:none"><span>Regulated facilities</span><span class="tg"></span></div>
            <div class="lyr" id="lyrRadius"><span>Impact radius</span><span class="tg"></span></div>
            <div class="lyr off" title="Available when flood data is ingested for this community"><span>Flood zones</span><span class="tg"></span></div>
            <div class="lyr off" title="Available when school data is ingested for this community"><span>Schools</span><span class="tg"></span></div>
          </div>
        </div>
        <div class="mgps" id="mapGps"></div>
      </div>
      <div class="pinlist" id="pinList"></div>
    </div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="lib/data.js"></script>
<script src="lib/templates.js"></script>
<script src="lib/map.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty;
  var c = await HS.data.community(S.zip);
  var projects = await HS.data.projects(S.zip, home);       // DEVELOPMENT only (permits / planning)
  var changes = await HS.data.changes(S.zip, home);
  var facilities = await HS.data.facilities(S.zip, home);   // EPA/ECHO regulated facilities — own layer, env context

  var LET = 'ABCDEFGHIJKLMNOP';
  var FACILITY_HEX = '#6f42c1';   // regulated facilities — distinct from the impact-tier pin colors
  var opts = { radiusMi: 1.5, showRadius: true, showProjects: true, showFacilities: true, mode: 'impact' };
  // Development/alert pins (impact-tiered). Facilities are deliberately NOT concatenated here —
  // they render in their own labeled layer (facs) so they read as environmental context, never development.
  var all = changes.filter(function(x){return !x.quiet;}).concat(projects)
    .filter(function(x){return x.lat && x.lng;})
    .sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);});
  var facs = (facilities || []).filter(function(x){return x.lat && x.lng;})
    .sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);}).slice(0, 24);
  if (facs.length) {   // reveal the facilities legend + layer toggle only when there are any
    var _lf = document.getElementById('legFacility'); if (_lf) _lf.style.display = '';
    var _lyf = document.getElementById('lyrFacilities'); if (_lyf) _lyf.style.display = '';
  }

  function shownItems() {
    var a = opts.showProjects ? all : all.filter(function(x){return !x.type;});
    return a.slice(0, 16).map(function(it,i){ return Object.assign({}, it, {_letter: LET[i]}); });
  }
  var center = home || all[0] || { lat: c && c.lat || 30.17, lng: c && c.lng || -97.61 };
  // NEVER-FAKED rule: only a real signed-in resident home (in THIS ZIP, not the
  // Del Valle sample) may be pinned as "Your home". For everyone else the centroid
  // only centers/zooms the viewport — we pin nothing and show a set-your-home nudge
  // (matches the development tracker's "no home pin until the resident searches").
  var hasRealHome = !!(home && !home.sample && home.zip === S.zip);

  function tierHex(it){ var k = HS.mapTier(it).k; return {high:'#c23b34',moderate:'#c47a1a',watch:'#3f7fb0',positive:'#1f9d5c'}[k] || '#3f7fb0'; }

  var panelHTML = document.querySelector('.mpanel').outerHTML;
  var gpsEl = document.getElementById('mapGps');

  function renderPins(items) {
    document.getElementById('pinList').innerHTML =
      '<div class="groupHead" style="margin-top:0">Near you · closest first</div>'
      + items.map(function (it) {
        var col = tierHex(it);
        return '<div class="card mini" style="border-left-color:' + col + '">'
          + '<span class="lens"><span class="letter" style="background:' + col + '">' + it._letter + '</span>&nbsp; '
          + HS.esc(it.type || it.category || '') + ' · ' + HS.esc(it.dist||'') + '</span>'
          + '<h3>' + HS.esc(it.name || it.title) + '</h3>'
          + '<p class="sowhat">' + HS.esc(it.sowhat || it.plain_language || '') + '</p></div>';
      }).join('');
  }
  function setGps(items){
    var within = items.filter(function(x){return (x.distance_mi||9e9) <= opts.radiusMi;}).length;
    var place = c ? ((HS.isSample && HS.isSample()) ? c.name + ' — (Sample Zip Code)' : c.name + ', ' + c.state) : 'Your area';
    gpsEl.textContent = place + ' · ' + within + ' items within ' + opts.radiusMi + ' mi';
    updateHomePrompt();
  }
  // Set-your-home nudge — shown ONLY when there's no real resident home to pin.
  // Doubles as a follow/signup prompt (opens the set-your-area flow). Removed once
  // a real home exists (then the home marker renders instead).
  function updateHomePrompt(){
    var wrap = document.getElementById('mapWrap'), el = document.getElementById('mapHomePrompt');
    if (hasRealHome) { if (el) el.remove(); return; }
    if (!el) {
      if (wrap && getComputedStyle(wrap).position === 'static') wrap.style.position = 'relative';
      el = document.createElement('button');
      el.id = 'mapHomePrompt'; el.type = 'button';
      el.style.cssText = 'position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:6;'
        + 'background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 15px;'
        + 'font:600 12.5px/1 var(--font);color:var(--ink);box-shadow:var(--shadow);cursor:pointer';
      el.textContent = '◎ Set your area to map your home & get alerts';
      el.onclick = function(){ if (HS.openLoc) HS.openLoc(); };
      if (wrap) wrap.appendChild(el);
    }
  }
  function wirePanel(redraw){
    document.getElementById('lyrProjects').classList.toggle('off', !opts.showProjects);
    document.getElementById('lyrRadius').classList.toggle('off', !opts.showRadius);
    document.getElementById('lyrProjects').onclick = function(){ opts.showProjects=!opts.showProjects; redraw(); };
    document.getElementById('lyrRadius').onclick = function(){ opts.showRadius=!opts.showRadius; redraw(); };
    var lyf = document.getElementById('lyrFacilities');
    if (lyf && facs.length) {
      lyf.classList.toggle('off', !opts.showFacilities);
      lyf.onclick = function(){ opts.showFacilities=!opts.showFacilities; redraw(); };
    }
  }

  // ---------- impact diagram (schematic SVG — the fallback view) ----------
  function drawSchematic() {
    var items = shownItems();
    // render into #mapSch only; the overlay panel + gps chip are static siblings in #mapWrap
    HS.MapProvider.render(document.getElementById('mapSch'), {
      home: center, items: items, radiusMi: opts.radiusMi, showRadius: opts.showRadius,
      showHome: hasRealHome, w: 780, h: 520
    });
    overlayFacilities(document.getElementById('mapSch'));
    setGps(items); renderPins(items);
    wirePanel(function(){ if (opts.mode==='impact') drawSchematic(); else drawGL(); });
  }

  // Overlay regulated facilities onto the schematic SVG as distinct purple squares
  // (labeled "Regulated facility" in the legend). Same projection the MapProvider uses,
  // so they sit correctly relative to home. Kept separate from the impact pins above.
  function overlayFacilities(el){
    if (!opts.showFacilities || !facs.length) return;
    var svg = el && el.querySelector('svg'); if (!svg) return;
    var w=780, h=520, cx=w/2, cy=h/2, radiusPx=Math.min(w,h)*0.29, pxPerMile=radiusPx/opts.radiusMi;
    var hLat=center.lat, hLng=center.lng, NS='http://www.w3.org/2000/svg';
    facs.forEach(function(f){
      var north=(f.lat-hLat)*69, east=(f.lng-hLng)*69*Math.cos(hLat*Math.PI/180);
      var x=Math.max(20,Math.min(w-20, cx+east*pxPerMile)), y=Math.max(20,Math.min(h-20, cy-north*pxPerMile));
      var rect=document.createElementNS(NS,'rect');
      rect.setAttribute('x',x-7); rect.setAttribute('y',y-7); rect.setAttribute('width',14); rect.setAttribute('height',14);
      rect.setAttribute('rx',3); rect.setAttribute('fill',FACILITY_HEX); rect.setAttribute('stroke','#fff'); rect.setAttribute('stroke-width',3);
      var t=document.createElementNS(NS,'title');
      t.textContent = f.name + ' · Regulated facility' + (f.dist?' · '+f.dist:'');
      rect.appendChild(t);
      if (f.source_ref) {   // keep the official record link on the marker
        var a=document.createElementNS(NS,'a');
        a.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href',f.source_ref);
        a.setAttribute('href',f.source_ref); a.setAttribute('target','_blank'); a.setAttribute('rel','noopener');
        a.appendChild(rect); svg.appendChild(a);
      } else {
        svg.appendChild(rect);
      }
    });
  }

  // ---------- MapLibre (real tiles: Esri World Imagery + OSM) ----------
  var glMap = null, glMarkers = [], glReady = false, glFailed = false, glTileErrs = 0;
  function circle(lat, lng, rMi){
    var pts=[], R=rMi/69.0, cs=Math.cos(lat*Math.PI/180);
    for(var i=0;i<=64;i++){var a=i/64*2*Math.PI; pts.push([lng + (R*Math.sin(a))/cs, lat + R*Math.cos(a)]);}
    return {type:'FeatureCollection',features:[{type:'Feature',geometry:{type:'Polygon',coordinates:[pts]}}]};
  }
  function zoomFor(r){ return ({'0.5':14,'1':13,'1.5':12.4,'2':12,'3':11.4,'5':10.7})[String(r)] || 12; }
  function clearMarkers(){ glMarkers.forEach(function(m){m.remove();}); glMarkers=[]; }
  function addMarkers(items){
    clearMarkers();
    // Only pin a REAL resident home — never a centroid stand-in (never-faked rule).
    if (hasRealHome) {
      var h=document.createElement('div');
      h.style.cssText='width:20px;height:20px;border-radius:50%;background:#157a49;border:3px solid #fff;box-shadow:0 0 0 6px rgba(21,122,73,.18)';
      glMarkers.push(new maplibregl.Marker({element:h}).setLngLat([center.lng,center.lat])
        .setPopup(new maplibregl.Popup({offset:14}).setHTML('<b>Your home</b>')).addTo(glMap));
    }
    items.forEach(function(it){
      var col=tierHex(it), el=document.createElement('div');
      el.style.cssText='width:26px;height:26px;border-radius:50%;background:'+col+';border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:grid;place-items:center;color:#fff;font:700 12px/1 sans-serif;cursor:pointer';
      el.textContent=it._letter;
      var html='<div style="font:600 13px/1.3 var(--font)">'+HS.esc(it.name||it.title)+'</div>'
        +'<div style="font-size:11px;color:#5a6b63">'+HS.esc(it.type||it.category||'')+(it.dist?' · '+HS.esc(it.dist):'')+'</div>'
        +(it.source_ref?'<a href="'+HS.esc(it.source_ref)+'" target="_blank" rel="noopener" style="font-size:11.5px;color:#157a49;font-weight:600">official record ▸</a>':'');
      glMarkers.push(new maplibregl.Marker({element:el}).setLngLat([it.lng,it.lat])
        .setPopup(new maplibregl.Popup({offset:12,maxWidth:'260px'}).setHTML(html)).addTo(glMap));
    });
    // Regulated facilities — a DISTINCT layer (purple squares), env context, not development.
    if (opts.showFacilities) facs.forEach(function(f){
      var el=document.createElement('div');
      el.style.cssText='width:20px;height:20px;border-radius:3px;background:'+FACILITY_HEX+';border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer';
      var html='<div style="font:600 13px/1.3 var(--font)">'+HS.esc(f.name)+'</div>'
        +'<div style="font-size:11px;color:#5a6b63">Regulated facility'+(f.developer?' · '+HS.esc(f.developer):'')+(f.dist?' · '+HS.esc(f.dist):'')+'</div>'
        +(f.source_ref?'<a href="'+HS.esc(f.source_ref)+'" target="_blank" rel="noopener" style="font-size:11.5px;color:#157a49;font-weight:600">View public record ▸</a>':'');
      glMarkers.push(new maplibregl.Marker({element:el}).setLngLat([f.lng,f.lat])
        .setPopup(new maplibregl.Popup({offset:12,maxWidth:'260px'}).setHTML(html)).addTo(glMap));
    });
  }
  function ensureGL(){
    if (glMap) return;
    glMap = new maplibregl.Map({
      container:'mapgl',
      style:{ version:8, sources:{
        sat:{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256,attribution:'© Esri, Maxar'},
        osm:{type:'raster',tiles:['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png','https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'}
      }, layers:[
        {id:'osm',type:'raster',source:'osm',layout:{visibility:'none'}},
        {id:'sat',type:'raster',source:'sat',layout:{visibility:'none'}}
      ]},
      center:[center.lng,center.lat], zoom: zoomFor(opts.radiusMi)
    });
    glMap.addControl(new maplibregl.NavigationControl({showCompass:false}), 'top-right');
    // GUARDRAIL (required companion to the Satellite default): Esri World Imagery / OSM
    // are free, keyless and NOT production-contracted, so a traffic spike can be
    // rate-limited (429) or a tile host can fail. Rather than a broken map, degrade to
    // the impact diagram. Trip on repeated tile/source errors (not one edge-tile 404),
    // or if the map never finishes loading (stalled provider).
    glMap.on('error', function(ev){
      if (!ev) return;
      var src = ev.sourceId, msg = ev.error && String(ev.error.message || ev.error);
      if (src==='sat' || src==='osm' || (msg && /429|rate|tile|failed to fetch|network/i.test(msg))) {
        if (++glTileErrs >= 4) degradeToSchematic();
      }
    });
    setTimeout(function(){ if (!glReady) degradeToSchematic(); }, 9000);
    glMap.on('load', function(){
      glMap.addSource('radius',{type:'geojson',data:circle(center.lat,center.lng,opts.radiusMi)});
      glMap.addLayer({id:'radius-fill',type:'fill',source:'radius',paint:{'fill-color':'#157a49','fill-opacity':0.08}});
      glMap.addLayer({id:'radius-line',type:'line',source:'radius',paint:{'line-color':'#157a49','line-width':2,'line-opacity':0.7,'line-dasharray':[2,2]}});
      glReady=true; drawGL();
    });
  }
  function drawGL(){
    var items = shownItems();
    document.getElementById('mapSch').style.display='none';
    document.getElementById('mapgl').style.display='block';
    ensureGL();
    if (!glReady){ setGps(items); renderPins(items); return; }
    glMap.resize();
    // base layer per mode
    glMap.setLayoutProperty('sat','visibility', opts.mode==='satellite'?'visible':'none');
    glMap.setLayoutProperty('osm','visibility', opts.mode==='street'?'visible':'none');
    // radius + markers
    glMap.getSource('radius').setData(opts.showRadius ? circle(center.lat,center.lng,opts.radiusMi) : {type:'FeatureCollection',features:[]});
    glMap.setLayoutProperty('radius-fill','visibility', opts.showRadius?'visible':'none');
    glMap.setLayoutProperty('radius-line','visibility', opts.showRadius?'visible':'none');
    glMap.easeTo({ center:[center.lng,center.lat], zoom: zoomFor(opts.radiusMi), duration:300 });
    addMarkers(items);
    setGps(items); renderPins(items);
    wirePanel(drawGL);   // panel + gps are static siblings in #mapWrap, over both maps
  }

  function showSchematic(){
    document.getElementById('mapgl').style.display='none';
    document.getElementById('mapSch').style.display='block';
    drawSchematic();
  }
  // Move the active-mode highlight in the toolbar segment.
  function setActiveMode(mode){
    opts.mode = mode;
    var seg = document.getElementById('mapMode');
    [].forEach.call(seg.querySelectorAll('button'), function(b){ b.classList.toggle('on', b.dataset.mode === mode); });
  }
  // Fall back from the live tile map to the always-available impact diagram (offline,
  // missing lib, or a tile-provider rate-limit/failure). Idempotent + user-visible.
  function degradeToSchematic(){
    if (glFailed) return;
    glFailed = true;
    try { if (glMap) glMap.remove(); } catch (e) {}
    glMap = null; glReady = false;
    setActiveMode('impact');
    showSchematic();
    if (HS.toast) HS.toast('Live map is busy — showing the impact diagram. Try Satellite again shortly.');
  }

  // initial view: the REAL Satellite map for covered ZIPs that have something to plot
  // (Del Valle 78617 / Utah pass ZIPs). Falls back to the impact diagram when the live
  // map library is unavailable (offline / artifact preview) or there's nothing to map.
  if (window.maplibregl && (all.length || facs.length)) {
    setActiveMode('satellite');
    drawGL();
  } else {
    setActiveMode('impact');
    showSchematic();
  }

  // mode toggle
  document.getElementById('mapMode').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-mode]'); if (!btn) return;
    [].forEach.call(this.querySelectorAll('button'), function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
    opts.mode = btn.dataset.mode;
    if (opts.mode === 'impact') { showSchematic(); return; }
    if (!window.maplibregl || glFailed) {   // offline / no lib, or a live-map failure this session
      btn.classList.remove('on'); this.querySelector('[data-mode="impact"]').classList.add('on'); opts.mode='impact';
      HS.toast(glFailed ? 'Live map is unavailable right now — showing the impact diagram.'
                        : 'Satellite & Street need a network map connection — Impact view is live now.');
      showSchematic(); return;
    }
    drawGL();
  });

  var radii = [0.5,1,1.5,2,3,5], ri = 2;
  document.getElementById('radiusPill').onclick = function () {
    ri = (ri + 1) % radii.length; opts.radiusMi = radii[ri];
    this.textContent = '◉ Impact radius: ' + opts.radiusMi + ' mi ▾';
    if (opts.mode === 'impact') showSchematic(); else drawGL();
  };
});
</script>
</body>
</html>
