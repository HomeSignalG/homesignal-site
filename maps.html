<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Maps</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://server.arcgisonline.com https://cdn.jsdelivr.net; font-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src blob:; child-src blob:; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co https://server.arcgisonline.com https://*.tile.openstreetmap.org https://cdn.jsdelivr.net; form-action 'self'">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
  /* app-only: real MapLibre tile map (Esri/OSM) is the default; the schematic SVG
     sits beneath it as the offline / rate-limit fallback, with a shared overlay panel */
  #mapWrap{min-height:300px}
  #mapgl,#maplf{width:100%;height:520px;border-radius:15px;overflow:hidden}
  @media(max-width:900px){ #mapgl,#maplf{height:60vw;min-height:320px} }
  .maplibregl-popup-content{font-family:var(--font);font-size:13px;border-radius:10px;padding:9px 12px}
  .leaflet-popup-content{font-family:var(--font);font-size:13px}

  /* ── Sprint-1 map MVP: top filters (Project types / Quality of Life) ── */
  .fwrap{position:relative}
  .fpill.act{border-color:var(--green);color:var(--green);background:var(--green-tint)}
  .fpill .fct{display:inline-flex;min-width:16px;height:16px;padding:0 4px;margin-left:5px;border-radius:999px;
    background:var(--green);color:#fff;font-size:10.5px;font-weight:700;align-items:center;justify-content:center}
  .fmenu{position:absolute;top:calc(100% + 7px);right:0;z-index:20;min-width:230px;background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow);padding:9px;max-height:340px;overflow:auto}
  .fmenu[hidden]{display:none}
  .fmenu .fh{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);padding:4px 8px 7px}
  .fmenu label{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink);padding:7px 8px;border-radius:8px;cursor:pointer}
  .fmenu label:hover{background:var(--line-2)}
  .fmenu label input{accent-color:var(--green);width:15px;height:15px}
  .fmenu label .sg{margin-left:auto;opacity:.85}
  .fmenu .fnote{font-size:11px;color:var(--ink-3);padding:6px 8px 2px;line-height:1.4}
  .fmenu .fclear{width:100%;margin-top:6px;font-size:12px;font-weight:600;color:var(--green);background:var(--green-tint);
    border:1px solid #cbe7d5;border-radius:8px;padding:8px}

  /* ── type-shape legend row (shape = project type) ── */
  .shapeleg{margin-top:12px;padding-top:12px;border-top:1px solid var(--line-2)}
  .shrow{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink);margin-bottom:7px}
  /* app.css has `.mapwrap svg{width:100%}` for the schematic map; the small inline glyph
     SVGs in the legend/filter menus live inside .mapwrap too, so pin them to intrinsic size. */
  #shapeLegend svg,.fmenu svg{width:auto;height:auto;flex:none}

  /* ── Status rows double as show/hide toggles (reuse the .lyr switch) ── */
  .lyr .lbl{display:flex;align-items:center;gap:9px;color:var(--ink)}
  .lyr .lbl .ld{width:11px;height:11px;border-radius:50%;flex:none}
  /* ── empty state: shown when every status toggle is off (never a blank map) ── */
  #mapEmpty{position:absolute;inset:0;display:grid;place-items:center;z-index:3;pointer-events:none}
  #mapEmpty[hidden]{display:none}
  #mapEmpty .msg{pointer-events:auto;max-width:290px;text-align:center;background:rgba(255,255,255,.95);
    border:1px solid var(--line);border-radius:14px;padding:16px 20px;box-shadow:var(--shadow);
    font:600 13px/1.5 var(--font);color:var(--ink-2)}

  /* ── right INFORMATION panel (list ⇄ 6-section detail), stays on the map ── */
  .pinlist{max-height:none}
  .listhead{font-size:12.5px;color:var(--ink-3);margin:0 4px 12px}
  .listhead b{color:var(--ink)}
  .card.mini.clickable{transition:transform .08s ease,box-shadow .12s ease}
  .card.mini.sel{box-shadow:0 0 0 2px var(--green);transform:none}
  .idetail .backbtn{margin-bottom:14px}
  .idetail .isum{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm)}
  .idetail .isum h2{font-size:19px;margin:6px 0 6px;letter-spacing:-.01em}
  .idetail .isum .lead{font-size:13.5px;line-height:1.5;color:var(--ink-2);margin:0}
  .isec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);margin-top:12px}
  .isec > h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin:0 0 11px}
  .qolgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .qcell{border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fbfcfb}
  .qcell.on{border-color:#cbe7d5;background:var(--green-tint)}
  .qcell .qn{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink)}
  .qcell .qn .qd{width:9px;height:9px;border-radius:50%;background:var(--line);flex:none}
  .qcell.on .qn .qd{background:var(--green-2)}
  .qcell .qs{font-size:11px;color:var(--ink-3);margin-top:3px}
  .qcell.on .qs{color:var(--green)}
  .ihint{font-size:11px;color:var(--ink-3);margin:11px 0 0;line-height:1.45}
  .specs.tight .row{padding:6px 0;font-size:12.5px}
  .partcard{border:1px solid #f0dcbd;background:var(--amber-tint);border-radius:11px;padding:13px 14px;margin-bottom:11px}
  .partcard .pt{font-size:13.5px;font-weight:700;color:var(--ink)}
  .partcard .pd{font-size:12px;color:var(--ink-2);margin-top:3px}
  .idetail .doact{margin-top:2px}
  @media(max-width:900px){ .fmenu{right:auto;left:0} }

  /* ── Sprint-2 polish: readability & rhythm ── */
  .ph p{line-height:1.55;max-width:640px}
  .listhead{color:var(--ink-2);line-height:1.5}
  .card.mini .sowhat{line-height:1.5}
  .idetail .isum .lead{line-height:1.55}
  .ihint,.fmenu .fnote{color:var(--ink-2);font-size:11.5px}
  .isec{padding:17px 18px 15px}
  .isec + .isec,.isum + .isec{margin-top:13px}
  .qcell .qs{font-size:11.5px}
  .mgps{max-width:min(72%,460px);line-height:1.4}

  /* ── loading skeletons (shown until the first real render replaces them) ── */
  .skl{height:11px;border-radius:6px;background:linear-gradient(90deg,var(--line-2) 25%,#f7f9f7 45%,var(--line-2) 65%);
    background-size:200% 100%;animation:hsShimmer 1.3s linear infinite;margin-bottom:9px}
  .skl.w40{width:40%} .skl.w70{width:70%} .skl.w90{width:90%}
  .skl.hd{height:14px;width:55%;margin:2px 0 14px}
  @keyframes hsShimmer{from{background-position:200% 0}to{background-position:-200% 0}}
  .maploading{position:absolute;inset:0;display:grid;place-items:center;z-index:4;
    font-size:13px;font-weight:600;color:var(--ink-2);background:rgba(244,246,244,.6)}

  /* ── empty / notice cards in the info panel ── */
  .emptycard{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:22px 18px;text-align:center}
  .emptycard .et{font-size:14.5px;font-weight:700;margin-bottom:6px}
  .emptycard .ed{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin:0 0 12px}
  .emptycard .btn{display:inline-flex}

  /* ── MAP-FIRST LAYOUT (Sprint 7.5) — page-scoped; app.css untouched ──
     The map is the dominant surface: the old permanent right column becomes a
     slide-over panel INSIDE the map stage (bottom sheet on mobile). Closing it
     restores the full map. Exactly one panel; its content swaps between the
     nearby list, Recent Changes, and the project detail. */
  .page.mapsfull{max-width:none;display:flex;flex-direction:column}
  .mapsfull .ph{margin:2px 0 10px}
  .mapsfull .ph h1{font-size:21px}
  .mapsfull .ph > p{display:none}   /* the intro line yields to the map; legend + panel carry its content */
  .mapsfull .toolbar{margin-bottom:10px}
  .mapsfull .mapcols{display:block}                 /* kill the old two-column grid */
  .mapsfull .mapwrap{position:relative;width:100%;overflow:hidden}  /* height set by JS to fill the viewport */
  .mapsfull #mapgl,.mapsfull #maplf{height:100%}
  .mapsfull #mapSch{height:100%;display:grid;place-items:center;background:#e4eadd}
  .mapsfull #mapSch svg{max-height:100%}

  .sidepanel{position:absolute;top:0;right:0;bottom:0;width:min(400px,92%);z-index:9;
    background:#f6f8f5;border-left:1px solid var(--line);box-shadow:-14px 0 34px rgba(22,33,28,.16);
    transform:translateX(105%);transition:transform .25s ease;visibility:hidden;
    display:flex;flex-direction:column}
  .sidepanel.open{transform:translateX(0);visibility:visible}
  .sidepanel .pclose{position:absolute;top:10px;right:12px;z-index:3;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:#fff;color:var(--ink-2);font:600 13px/1 var(--font);cursor:pointer}
  .sidepanel .pclose:hover{color:var(--ink)}
  .sidepanel .pinlist{flex:1;overflow:auto;padding:16px 16px 18px;padding-top:46px;width:auto;max-height:none;margin:0}
  @media(max-width:900px){
    .sidepanel{top:auto;left:0;right:0;width:auto;max-height:74%;border-left:none;border-top:1px solid var(--line);
      border-radius:16px 16px 0 0;box-shadow:0 -12px 30px rgba(22,33,28,.18);transform:translateY(105%)}
    .sidepanel.open{transform:translateY(0)}
  }
  @media(prefers-reduced-motion:reduce){ .sidepanel{transition:none} }

  /* ── "What's Changed" view (Sprint 7) ── */
  .cbadge{display:inline-block;font:800 9.5px/1 var(--font);letter-spacing:.07em;padding:3px 7px;border-radius:5px;color:#fff;margin-right:5px}
  .cbadge.b-new{background:#1f9d5c} .cbadge.b-hearing{background:#c47a1a} .cbadge.b-update{background:#3f7fb0}
  .chgnote{font-size:11.5px;color:var(--ink-2);line-height:1.5;margin:2px 0 12px}
  .chgline{font-size:12px;color:var(--ink-2);margin-top:3px}

  /* ── marker clarity: hover/focus emphasis on tile-map pins ── */
  /* transform-box/origin pin the scale to the marker's OWN centre. The schematic
     (Impact-view) pins are SVG <g> whose children sit at absolute view-box coords;
     without this, transform-box defaults to `view-box` + origin `0 0`, so scale()
     grows the pin about the SVG origin — sliding it out from under the cursor and
     firing a mouseleave→mouseenter loop (the hover flutter). Scaling about the pin
     centre keeps the hit area under the cursor. Inert on the GL markers (MapLibre's
     inline positioning transform wins) and a no-op for the HTML markers (already
     centre-origin), so it only corrects the SVG case. */
  .hspin{transition:transform .1s ease;transform-box:fill-box;transform-origin:center}
  .hspin:hover,.hspin:focus-visible{transform:scale(1.18);z-index:6;position:relative}

  /* ── mobile: legend collapses to a pill so it doesn't bury the map ── */
  .legbtn{display:none}
  @media(max-width:700px){
    .legbtn{display:inline-flex;position:absolute;top:12px;left:12px;z-index:7;align-items:center;gap:6px;
      background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;
      font:600 12px/1 var(--font);color:var(--ink);box-shadow:var(--shadow-sm);cursor:pointer}
    .mpanel{display:none}
    .mpanel.open{display:block;max-height:70%;overflow:auto;top:48px}
    #mapHomePrompt{top:auto !important;bottom:52px}
    .toolbar{gap:7px}
    .idetail .isum h2{font-size:17.5px}
  }

  /* ── accessibility: visible focus + calmer motion when asked ── */
  .fpill:focus-visible,.legbtn:focus-visible,.card.mini[tabindex]:focus-visible,.lyr:focus-visible,
  .backbtn:focus-visible,.fmenu .fclear:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:9px}
  @media(prefers-reduced-motion:reduce){
    .card.mini.clickable,.card.clickable,.hspin{transition:none}
    .hspin:hover,.hspin:focus-visible{transform:none}
    .skl{animation:none}
  }
</style>
</head>

<template id="hs-content">
  <div class="page mapsfull">
    <div class="ph">
      <div class="eyebrow">Maps</div>
      <h1>What's changing around you</h1>
      <!-- The "which address is this about" line (#phWhere) is injected here by
           the SHARED shell.js::HS.paintWhereLine — one component for every page. -->

    </div>
    <div class="toolbar">
      <div class="seg" id="viewSeg" role="group" aria-label="Which projects to show">
        <button class="on" data-view="all" aria-pressed="true">All Projects</button>
        <button data-view="changed" aria-pressed="false">✦ What's Changed</button>
      </div>
      <div class="seg" id="mapMode">
        <!-- Order: Street | Satellite | Focus. "Focus" is the simplified HomeSignal
             schematic view; its data-mode key stays "impact" so all view logic,
             deep links, and active-button wiring below are unchanged. -->
        <button data-mode="street">Street</button>
        <button data-mode="satellite">Satellite</button>
        <button class="on" data-mode="impact">Focus</button>
      </div>
      <div class="sp"></div>
      <div class="fwrap">
        <button class="fpill" id="projFilterPill" aria-haspopup="true" aria-expanded="false">◈ Project types ▾</button>
        <div class="fmenu" id="projMenu" hidden></div>
      </div>
      <div class="fwrap">
        <button class="fpill" id="qolFilterPill" aria-haspopup="true" aria-expanded="false">❋ Quality of Life ▾</button>
        <div class="fmenu" id="qolMenu" hidden></div>
      </div>
      <div class="fwrap">
        <button class="fpill" id="radiusPill" aria-haspopup="true" aria-expanded="false">◉ Map view: 1.5 mi ▾</button>
        <div class="fmenu" id="radiusMenu" hidden></div>
      </div>
      <button class="fpill" id="listPill" aria-expanded="false" aria-controls="infoSlide">☰ List</button>
      <a class="fpill" id="hs-map-cross" data-znav="homesignalmap.html" href="homesignalmap.html" style="text-decoration:none;display:inline-flex;align-items:center">◈ Development tracker</a>
    </div>
    <div class="mapcols">
      <div class="mapwrap" id="mapWrap">
        <div id="mapSch"></div>
        <div id="mapgl" style="display:none"></div>

        <div class="maploading" id="mapLoading">Finding what’s near you…</div>
        <div id="mapEmpty" hidden><div class="msg">No pin types are selected. Use the legend’s status toggles — Proposed, Approved, Operating, or Regulated facility — to show pins on the map.</div></div>
        <button class="legbtn" id="legToggle" type="button" aria-expanded="false" aria-controls="mapLegend">◧ Legend</button>
        <div class="mpanel" id="mapLegend">
          <!-- HONEST LEGEND (2026-07-16 audit): colors encode PERMIT STATUS — the only
               per-record fact the data carries. Shapes encode project TYPE (Sprint-1). -->
          <!-- Each status row is also a show/hide switch (same .tg toggle as "Show on
               Map"). State lives on the shared backbone (HS.*StatusFilter*, persisted),
               so a resident's choice applies on every ZIP page and survives radius
               changes / navigation. -->
          <div class="mt">Status — pin color</div>
          <div class="lyr" id="sttProposed"><span class="lbl"><span class="ld"></span> Proposed</span><span class="tg"></span></div>
          <div class="lyr" id="sttApproved"><span class="lbl"><span class="ld"></span> Approved</span><span class="tg"></span></div>
          <div class="lyr" id="sttOperating"><span class="lbl"><span class="ld"></span> Operating / built</span><span class="tg"></span></div>
          <div class="lyr" id="legFacility" style="display:none"><span class="lbl"><span class="ld"></span> Regulated facility</span><span class="tg"></span></div>
          <div class="shapeleg" id="shapeLegWrap" style="display:none">
            <div class="mt">Type — pin shape</div>
            <div id="shapeLegend"></div>
          </div>
          <div class="layers">
            <div class="mt">Show on Map</div>
            <div class="lyr" id="lyrRadius"><span>Radius ring</span><span class="tg"></span></div>
          </div>
        </div>
        <div class="mgps" id="mapGps" role="status"></div>
      <aside class="sidepanel" id="infoSlide" role="complementary" aria-label="Project details" aria-hidden="true">
        <button class="pclose" id="panelClose" type="button" aria-label="Close panel">✕</button>
        <div class="pinlist" id="infoPanel" aria-live="polite">
          <!-- loading skeleton — replaced by the first real render -->
          <div class="skl hd"></div>
          <div class="card mini"><div class="skl w40"></div><div class="skl w90"></div><div class="skl w70"></div></div>
          <div class="card mini"><div class="skl w40"></div><div class="skl w90"></div><div class="skl w70"></div></div>
          <div class="card mini"><div class="skl w40"></div><div class="skl w70"></div><div class="skl w90"></div></div>
        </div>
      </aside>
      </div>
    </div>
  </div>

<script>
HS.onReady(async function () {
  var qs = new URLSearchParams(location.search);
  var deepId = qs.get('id');
  var deepPlace = qs.get('place');
  if (deepPlace) HS.selectProperty(deepPlace);
  var S = HS.state, home = S.activeProperty;
  // Load everything the page needs up front, but NEVER hang on the skeleton: a failed
  // read renders an honest "couldn't load" state with a retry, not a frozen shimmer.
  var c = null, projects = [], changes = [], facilities = [], meetings = [];
  try {
    c = await HS.data.community(S.zip);
    projects = await HS.data.projects(S.zip, home);         // DEVELOPMENT only (permits / planning)
    changes = await HS.data.changes(S.zip, home);
    facilities = await HS.data.facilities(S.zip, home);     // EPA/ECHO regulated facilities — own layer, env context
    meetings = await HS.data.meetings(S.zip, home);         // for a project's Timeline + Public Participation
  } catch (e) {
    console.warn('[maps] data load failed', e);
    var ml0 = document.getElementById('mapLoading');
    if (ml0) ml0.textContent = 'The map can’t load right now.';
    var sl0 = document.getElementById('infoSlide');
    if (sl0) { sl0.classList.add('open'); sl0.setAttribute('aria-hidden', 'false'); }
    document.getElementById('infoPanel').innerHTML =
      '<div class="emptycard"><div class="et">We couldn’t load what’s near you</div>'
      + '<p class="ed">Your connection may have dropped, or our data service is briefly unavailable. Nothing is wrong with your account.</p>'
      + '<button class="btn primary" onclick="location.reload()">Try again</button></div>';
    return;
  }

  var LET = 'ABCDEFGHIJKLMNOP';
  // opts.types / opts.qol are the top-of-page filters (null/empty = show everything,
  // so a signed-out default load is byte-identical to the pre-Sprint page the verifier checks).
  var opts = { radiusMi: 1.5, showRadius: true, showFacilities: true, mode: 'impact', types: null, qol: null, view: 'all' };
  var selected = null;   // the project currently expanded in the right info panel (null = list view)
  var lastItems = [];    // most recent lettered set, so panel re-renders without a map redraw
  var deepApplied = false;

  // Distinct real project types + which pin-shapes appear, for the Project types filter + shape legend.
  var PROJECT_TYPES = projects.map(function (p) { return p.type; })
    .filter(function (t, i, a) { return t && a.indexOf(t) === i; }).sort();
  var shapesPresent = {};
  projects.forEach(function (p) { shapesPresent[HS.resolveMarker(p).shape] = 1; });

  HS.paintStatusLegend();

  // Development pins (colored by permit STATUS — HS.mapStatus). Facilities are deliberately NOT concatenated here —
  // they render in their own labeled layer (facs) so they read as environmental context, never development.
  var all = changes.filter(function(x){return !x.quiet;}).concat(projects)
    .filter(function(x){return x.lat && x.lng;})
    .sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);});
  var facs = (facilities || []).filter(function(x){return x.lat && x.lng;})
    .sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);}).slice(0, 24);
  // Sidebar rows list EVERY facility on record (closest-first), not just the mappable
  // ones — a facility with no stored coordinate still exists and still gets its dossier row.
  var facRows = (facilities || []).slice()
    .sort(function(a,b){return (a.distance_mi||9e9)-(b.distance_mi||9e9);});
  if (facs.length) {   // reveal the "Regulated facility" status toggle only when there are any
    var _lf = document.getElementById('legFacility'); if (_lf) _lf.style.display = '';
  }
  // "What's Changed" (Sprint 7): entries derived ONLY from dates the records
  // carry (filings / upcoming hearings / recorded notices) — HS.recentChanges
  // is the pure, unit-pinned backbone (lib/map.js). No change-history store
  // exists, so this is the honest fallback, and the panel says so.
  var CHANGE_DAYS = 30;
  var changeEntries = HS.recentChanges(projects, changes, meetings, { days: CHANGE_DAYS });
  var changedIds = {};
  changeEntries.forEach(function (e) { changedIds[e.id] = e; });

  buildShapeLegend();
  buildFilters();

  // Mobile: the legend/layers panel collapses behind a "Legend" pill so it never
  // buries the map on a small screen (desktop shows it inline as before).
  var legBtn = document.getElementById('legToggle'), legPanel = document.getElementById('mapLegend');
  if (legBtn && legPanel) legBtn.onclick = function () {
    var open = legPanel.classList.toggle('open');
    legBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  };

  // ── MAP-FIRST STAGE + SLIDE-OVER PANEL (Sprint 7.5) ─────────────────────────
  // The map stage fills the viewport below the compact header/toolbar; the ONE
  // side panel (nearby list / Recent Changes / project detail) slides over it
  // and closing it always restores the full map. Content swaps in place, so
  // only one primary panel can ever be open.
  function sizeStage() {
    var st = document.getElementById('mapWrap'); if (!st) return;
    var top = st.getBoundingClientRect().top;
    st.style.height = Math.max(420, window.innerHeight - top - 16) + 'px';
    try { if (glMap) glMap.resize(); } catch (e) {}
    try { if (lfMap) lfMap.invalidateSize(); } catch (e) {}
  }
  window.addEventListener('resize', sizeStage);
  sizeStage();

  var slideEl = document.getElementById('infoSlide'), listPill = document.getElementById('listPill');
  function panelOpen() { return slideEl.classList.contains('open'); }
  function openPanel() {
    slideEl.classList.add('open');
    slideEl.setAttribute('aria-hidden', 'false');
    if (listPill) listPill.setAttribute('aria-expanded', 'true');
  }
  function closePanel() {
    slideEl.classList.remove('open');
    slideEl.setAttribute('aria-hidden', 'true');
    selected = null;
    if (listPill) listPill.setAttribute('aria-expanded', 'false');
  }
  document.getElementById('panelClose').onclick = closePanel;
  if (listPill) listPill.onclick = function () {
    if (panelOpen() && !selected) { closePanel(); return; }
    selected = null; renderInfo(lastItems); openPanel();
  };
  // Keyboard: Escape closes an open filter menu first; a second Escape (or the first,
  // with no menu open) backs out of the project detail to the list.
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    var menuOpen = [].some.call(document.querySelectorAll('.fmenu'), function (m) {
      return !m.hasAttribute('hidden');
    });
    if (menuOpen) { closeAllMenus(); return; }
    if (selected) { var bk = document.getElementById('infoBack'); if (bk) bk.click(); return; }
    if (panelOpen()) closePanel();
  });
  // The first real render replaces the loading states (skeleton panel + map veil).
  function clearLoading() {
    var ml = document.getElementById('mapLoading'); if (ml) ml.remove();
  }

  // Top-of-page filters. Empty/absent = pass everything (default), so nothing narrows
  // until the resident opts in — and a QoL/Type dimension a record doesn't flag stays
  // absent (never inferred from the project type). anti-fabrication.
  function passType(it) {
    if (!opts.types || !opts.types.size) return true;
    return !!(it.type && opts.types.has(it.type));
  }
  function passQol(it) {
    if (!opts.qol || !opts.qol.size) return true;
    var q = HS.qolOf(it);
    var hit = false; opts.qol.forEach(function (cat) { if (q[cat]) hit = true; });
    return hit;
  }

  function shownItems() {
    // The legend's per-status toggles gate which pins appear; state lives on the
    // shared backbone (HS.*StatusFilter*, persisted) so the choice survives radius
    // changes / navigation. The "Regulated facility" status toggle now stands in for
    // the retired "Regulated facilities" layer toggle.
    opts.showFacilities = HS.getStatusFilters().facility;
    var a = all;
    // "What's Changed" narrows the map to records with a real in-window change
    // entry. Facilities carry no change data, so they don't reserve slots here.
    if (opts.view === 'changed') a = a.filter(function (x) { return changedIds[x.id]; });
    a = a.filter(function (x) { return passType(x) && passQol(x) && HS.statusVisible(x); });
    // Facilities reserve a FLOOR of lettered slots (min(4,#facs)) so the closest
    // regulated facilities are always surfaced alongside development — de-duped, cap 16.
    var facPins = (opts.view === 'changed' || !opts.showFacilities) ? [] : facs;
    var out = HS.reserveFacilitySlots(a, facPins, { cap: 16, floor: 4, letters: LET });
    // Live-verification hook (scripts/verify-maps.mjs, runs on a real runner with egress):
    // the lettered pin set + how many mappable facilities exist, so CI can assert the
    // reserve-slot floor holds on the real 78617 data. Mirrors homesignalmap's __HS_SITES.
    window.__HS_MAP = { items: out, facCount: facs.length };
    window.__HS_RESOLVE = HS.resolveMarker;
    return out;
  }
  // A facility lettered into shownItems must NOT also render as its own purple overlay
  // square — that double-plots the same facility (letter pin + square). Every map path
  // (schematic / GL / Leaflet) overlays only the facilities that did NOT earn a letter.
  function unletteredFacs(items) {
    var lettered = {};
    (items || []).forEach(function (it) { if (it._facility && it.id != null) lettered[it.id] = 1; });
    return facs.filter(function (f) { return !(f.id != null && lettered[f.id]); });
  }
  // NEVER-FAKED rule: only a real signed-in resident home (in THIS ZIP, not the
  // Del Valle sample) may be pinned as "Your home" or used as the viewport anchor.
  var hasRealHome = !!HS.realHome();
  var cCentroid = (c && c.lat != null && c.lng != null) ? { lat: c.lat, lng: c.lng } : null;
  var center = (hasRealHome ? home : null) || cCentroid || all[0] || facs[0] || null;

  // Area-wide notices: REAL records with no parcel point (jurisdiction-level
  // planning/civic items). They have no honest map position, so they are LISTED, never plotted.
  var area = changes.filter(function(x){ return !x.quiet && !(x.lat && x.lng); })
    .sort(function(a,b){ return String(b.occurred_at||'').localeCompare(String(a.occurred_at||'')); })
    .slice(0, 8);

  var gpsEl = document.getElementById('mapGps');

  function buildShapeLegend() {
    var present = Object.keys(shapesPresent);
    if (!present.length) return;
    var wrap = document.getElementById('shapeLegWrap');
    var box = document.getElementById('shapeLegend');
    var neutral = HS.markerRegistry.neutralHex;
    box.innerHTML = HS.SHAPE_LEGEND.filter(function (s) { return shapesPresent[s.shape]; })
      .map(function (s) {
        return '<div class="shrow">' + HS.markerSVG(s.shape, neutral, '', 16) + '<span>' + HS.esc(s.label) + '</span></div>';
      }).join('');
    wrap.style.display = '';
  }

  function buildFilters() {
    // Projects (by type) — real types present in this ZIP's data. Toolbar label is
    // "Project types" (not "Projects") so it is never confused with the retired
    // show-on-map layer toggle.
    var projMenu = document.getElementById('projMenu');
    var projPill = document.getElementById('projFilterPill');
    var neutral = HS.markerRegistry.neutralHex;
    if (!PROJECT_TYPES.length) {
      projPill.style.opacity = '.5'; projPill.title = 'No project records to filter for this area yet';
    } else {
      projMenu.innerHTML = '<div class="fh">Project types</div>'
        + PROJECT_TYPES.map(function (t) {
            var mk = HS.resolveMarker({ type: t });
            return '<label><input type="checkbox" data-type="' + HS.esc(t) + '">'
              + HS.markerSVG(mk.shape, neutral, '', 15)
              + '<span>' + HS.esc(t) + '</span></label>';
          }).join('')
        + '<button class="fclear" id="projClear" type="button">Show all types</button>';
    }
    // Quality of Life (Air/Water/Soil/Noise/Light) — narrows to records that FLAG the
    // dimension; Soil/Noise/Light rarely carry data yet, so those act as UI-only today.
    var qolMenu = document.getElementById('qolMenu');
    qolMenu.innerHTML = '<div class="fh">Quality-of-life lens</div>'
      + HS.QOL.map(function (q) {
          return '<label><input type="checkbox" data-qol="' + q + '"><span>' + q + '</span>'
            + '<span class="sg" style="color:var(--ink-3);font-size:11px">' + qolCount(q) + '</span></label>';
        }).join('')
      + '<div class="fnote">Shows only projects whose public record notes that impact. If it\'s not on record, we don\'t guess.</div>'
      + '<button class="fclear" id="qolClear" type="button">Clear lens</button>';

    // popover open/close (one at a time; outside-click closes)
    wireMenu(projPill, projMenu);
    wireMenu(qolPillWire(), qolMenu);

    projMenu.addEventListener('change', function (e) {
      var cb = e.target.closest('input[data-type]'); if (!cb) return;
      opts.types = opts.types || new Set();
      if (cb.checked) opts.types.add(cb.getAttribute('data-type')); else opts.types.delete(cb.getAttribute('data-type'));
      refreshFilterPills(); redraw();
    });
    qolMenu.addEventListener('change', function (e) {
      var cb = e.target.closest('input[data-qol]'); if (!cb) return;
      opts.qol = opts.qol || new Set();
      if (cb.checked) opts.qol.add(cb.getAttribute('data-qol')); else opts.qol.delete(cb.getAttribute('data-qol'));
      refreshFilterPills(); redraw();
    });
    var pc = document.getElementById('projClear');
    if (pc) pc.onclick = function () { opts.types = null; [].forEach.call(projMenu.querySelectorAll('input'), function(i){i.checked=false;}); refreshFilterPills(); redraw(); };
    document.getElementById('qolClear').onclick = function () { opts.qol = null; [].forEach.call(qolMenu.querySelectorAll('input'), function(i){i.checked=false;}); refreshFilterPills(); redraw(); };
  }
  function qolPillWire(){ return document.getElementById('qolFilterPill'); }
  function qolCount(cat) {
    var n = all.filter(function (x) { return HS.qolOf(x)[cat]; }).length;
    return n ? n + '' : '—';
  }
  function wireMenu(pill, menu) {
    pill.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = menu.hasAttribute('hidden');
      closeAllMenus();
      if (open) { menu.removeAttribute('hidden'); pill.setAttribute('aria-expanded', 'true'); }
    });
    menu.addEventListener('click', function (e) { e.stopPropagation(); });
  }
  function closeAllMenus() {
    [].forEach.call(document.querySelectorAll('.fmenu'), function (m) { m.setAttribute('hidden', ''); });
    [].forEach.call(document.querySelectorAll('.fpill[aria-haspopup]'), function (p) { p.setAttribute('aria-expanded', 'false'); });
  }
  document.addEventListener('click', closeAllMenus);
  function refreshFilterPills() {
    var pn = opts.types ? opts.types.size : 0, qn = opts.qol ? opts.qol.size : 0;
    var pp = document.getElementById('projFilterPill'), qp = document.getElementById('qolFilterPill');
    pp.classList.toggle('act', !!pn);
    pp.innerHTML = '◈ Project types' + (pn ? ' <span class="fct">' + pn + '</span>' : '') + ' ▾';
    qp.classList.toggle('act', !!qn);
    qp.innerHTML = '❋ Quality of Life' + (qn ? ' <span class="fct">' + qn + '</span>' : '') + ' ▾';
  }
  // Redraw the map in whatever mode is active (filters/toggles changed).
  function redraw() { if (opts.mode === 'impact') drawSchematic(); else drawTiles(); }

  // ---------------- RIGHT INFO PANEL: list ⇄ 6-section project detail --------
  function renderInfo(items) { clearLoading(); lastItems = items; if (selected) renderDetail(selected); else renderList(items); applyDeepId(items); }
  function selectItem(it) {
    if (!it) return; selected = it; renderDetail(it);
    openPanel();                      // the ONE panel — detail replaces whatever was showing
    var p = document.getElementById('infoPanel'); if (p) p.scrollTop = 0;
  }
  // A lettered REGULATED FACILITY routes to its dossier (an existing condition, not a
  // development "project"), so it never opens the project-framed 6-section panel.
  function openItem(it) { if (!it) return; if (it._facility) { location.href = 'development.html?id=' + encodeURIComponent(it.id); return; } selectItem(it); }
  function clearSelection() { selected = null; renderInfo(lastItems); }

  function applyDeepId(items) {
    if (!deepId || deepApplied) return;
    var pick = (items || []).find(function (x) { return x.id === deepId; })
      || all.find(function (x) { return x.id === deepId; })
      || projects.find(function (x) { return x.id === deepId; })
      || facs.find(function (x) { return x.id === deepId; });
    if (!pick) return;
    deepApplied = true;
    if (pick._facility || (facilities || []).some(function (f) { return f.id === pick.id; })) {
      location.href = HS.pageHref('development.html', { zip: S.zip, id: pick.id });
      return;
    }
    selectItem(pick);
  }

  function pinHref(it) {
    if (it.type) return { url: 'development.html?id=' + encodeURIComponent(it.id), ext: false };
    if (it.related_project_id) return { url: 'development.html?id=' + encodeURIComponent(it.related_project_id), ext: false };
    if (it.source_ref) return { url: it.source_ref, ext: true };
    return null;
  }

  // Default state: the nearby-projects list. Selecting a card (or a pin) opens the
  // 6-section detail IN THIS PANEL — the resident never leaves the map.
  function renderList(items) {
    var place = c ? c.name : 'your area';
    var filtersOn = (opts.types && opts.types.size) || (opts.qol && opts.qol.size);
    var panel = document.getElementById('infoPanel');
    panel.classList.remove('idetail');
    if (opts.view === 'changed') { renderChangedList(items, panel, place); return; }

    // Honest, friendly EMPTY STATES (never a blank column):
    //  a) nothing on record at all for this area;
    //  b) the resident's filters match nothing — offer a one-tap way back.
    if (!items.length && !filtersOn && !all.length && !facRows.length && !area.length) {
      openPanel();   // an empty area must SAY so, not hide behind a closed panel
      panel.innerHTML = '<div class="emptycard"><div class="et">Nothing on the public record near here yet</div>'
        + '<p class="ed">We check official county and permit records for ' + HS.esc(place)
        + ' continuously. When a project, hearing, or permit appears, it shows up here and on the map.</p>'
        + '<button class="btn primary" onclick="HS.addHome ? HS.addHome() : HS.openLoc()">'
        + (hasRealHome ? 'Check a different area' : 'Add your home to watch this area') + '</button></div>';
      return;
    }
    if (!items.length && filtersOn) {
      openPanel();   // filter feedback must be visible
      panel.innerHTML = '<div class="emptycard"><div class="et">No projects match your filters</div>'
        + '<p class="ed">Nothing near ' + HS.esc(place) + ' matches that combination right now. '
        + 'Clear the filters to see everything on the map again.</p>'
        + '<button class="btn primary" id="emptyClear">Show everything</button></div>';
      var ec = panel.querySelector('#emptyClear');
      if (ec) ec.onclick = function () {
        opts.types = null; opts.qol = null;
        ['projMenu', 'qolMenu'].forEach(function (id) {
          var m = document.getElementById(id); if (m) [].forEach.call(m.querySelectorAll('input'), function (i) { i.checked = false; });
        });
        refreshFilterPills(); redraw();
      };
      return;
    }

    var html = '<div class="listhead">'
      + (filtersOn ? '<b>' + items.length + '</b> of ' + all.length + ' nearby projects match your filters.'
                   : 'Showing <b>' + items.length + '</b> project' + (items.length === 1 ? '' : 's') + ' near ' + HS.esc(place) + '.')
      + ' Select one for the full picture.</div>'
      + '<div class="groupHead" style="margin-top:0">Near you · closest first</div>'
      + items.map(function (it, i) {
        var mk = HS.resolveMarker(it), col = mk.color, st = it.status ? HS.esc(it.status) : '';
        var aria = HS.esc(mk.popupLabel);
        return '<div class="card mini clickable" data-pin="' + i + '" role="button" tabindex="0" aria-label="' + aria + '" style="border-left-color:' + col + '">'
          + '<span class="lens"><span class="letter" style="background:' + col + ';color:#fff;font-weight:700;border-radius:5px;padding:1px 6px;font-size:11px" aria-hidden="true">' + it._letter + '</span>&nbsp; '
          + HS.esc(mk.typeLabel || it.type || it.category || '') + (st ? ' · ' + st : '') + (it.dist ? ' · ' + HS.esc(it.dist) : '') + '</span>'
          + '<h3>' + HS.esc(it.name || it.title) + '</h3>'
          + '<p class="sowhat">' + HS.esc(it.sowhat || it.plain_language || '') + '</p></div>';
      }).join('');
    // Area-wide notices — real records, no map letter, whole-area (never plotted at a fake point).
    if (area.length) {
      html += '<div class="groupHead">Area-wide notices · affect the whole area</div>'
        + area.map(function (it, i) {
          return '<div class="card mini' + (it.source_ref ? ' clickable" role="button" tabindex="0" data-area="' + i : '') + '" style="border-left-color:' + HS.markerRegistry.neutralHex + '">'
            + '<span class="lens">' + HS.esc(it.category || 'Notice')
            + (it.occurred_at ? ' · ' + HS.esc(String(it.occurred_at).slice(0, 10)) : '') + '</span>'
            + '<h3>' + HS.esc(it.title || '') + '</h3>'
            + '<p class="sowhat">' + HS.esc(it.plain_language || '') + '</p></div>';
        }).join('');
    }
    // Regulated facilities — the THIRD entity type, own section (never folded into the
    // A–P development list). Facilities that earned a letter above are not repeated here.
    var letteredFacIds = {};
    items.forEach(function (it) { if (it._facility && it.id != null) letteredFacIds[it.id] = 1; });
    var sectionFacs = facRows.filter(function (f) { return !(f.id != null && letteredFacIds[f.id]); });
    html += '<div class="groupHead">Regulated facilities · nearby</div>';
    if (sectionFacs.length) {
      html += sectionFacs.map(function (f, i) {
        var interp = HS.fac.interpret(f.facility_env || null);
        return '<div class="card mini clickable" data-fac="' + i + '" role="button" tabindex="0" aria-label="' + HS.esc(f.name + '. Regulated facility' + (f.dist ? ', ' + f.dist + ' away' : '')) + '" style="border-left-color:' + HS.markerRegistry.facilityHex + '">'
          + '<span class="lens">' + HS.esc(f.type || 'Regulated facility') + (f.dist ? ' · ' + HS.esc(f.dist) : '') + '</span>'
          + '<h3>' + HS.esc(f.name) + '</h3>'
          + '<p class="sowhat">' + HS.esc(interp ? interp.line : 'Permit status not yet confirmed — open the facility record.') + '</p></div>';
      }).join('');
    } else {
      html += '<div class="card mini" style="border-left-color:' + HS.markerRegistry.facilityHex + '">'
        + '<p class="sowhat">Good news for this lens: no regulated industrial facilities are on the public record near this area.</p></div>';
    }
    panel.innerHTML = html;
    // Click + keyboard (Enter/Space) — every card is reachable and operable without a mouse.
    function actAll(sel, act) {
      panel.querySelectorAll(sel).forEach(function (el) {
        el.addEventListener('click', function () { act(el); });
        el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); act(el); }
        });
      });
    }
    actAll('[data-pin]', function (el) { openItem(items[parseInt(el.getAttribute('data-pin'), 10)]); });
    actAll('[data-fac]', function (el) {
      var f = sectionFacs[parseInt(el.getAttribute('data-fac'), 10)];
      if (f) location.href = 'development.html?id=' + encodeURIComponent(f.id);
    });
    actAll('[data-area]', function (el) {
      var it = area[parseInt(el.getAttribute('data-area'), 10)];
      if (it && it.source_ref) window.open(it.source_ref, '_blank', 'noopener');
    });
  }

  // ── "Recent Changes" panel (Sprint 7) — the What's-Changed list view. ──────
  // Entries are the pre-derived changeEntries (real dates only). Clicking one
  // centers the live map on its pin and opens the EXISTING project panel —
  // no new page. Area-wide records (no honest point) list below, labeled.
  function renderChangedList(items, panel, place) {
    var byId = {};
    items.forEach(function (it) { byId[it.id] = it; });
    var mapped = changeEntries.filter(function (e) { return byId[e.id]; });
    // real recent records with no map point (jurisdiction-wide) — listed, never plotted
    var areaChg = changeEntries.filter(function (e) { return !byId[e.id] && !(e.item.lat && e.item.lng); });

    function badgeHTML(e) {
      return e.badges.map(function (b) {
        return '<span class="cbadge b-' + b.toLowerCase() + '">' + b + '</span>';
      }).join('');
    }
    function entryCard(e, i, attr) {
      var it = byId[e.id] || e.item;
      var name = it.name || it.title || '';
      var mk = HS.resolveMarker(it);
      var letter = it._letter ? '<span class="letter" style="background:' + mk.color + ';color:#fff;font-weight:700;border-radius:5px;padding:1px 6px;font-size:11px" aria-hidden="true">' + it._letter + '</span>&nbsp; ' : '';
      return '<div class="card mini clickable" ' + attr + '="' + i + '" role="button" tabindex="0" aria-label="' + HS.esc(e.badges.join(', ') + '. ' + name) + '">'
        + '<span class="lens">' + letter + badgeHTML(e) + '</span>'
        + '<h3>' + HS.esc(name) + '</h3>'
        + e.lines.map(function (l) { return '<div class="chgline">' + HS.esc(l) + '</div>'; }).join('')
        + '</div>';
    }

    if (!mapped.length && !areaChg.length) {
      panel.innerHTML = '<div class="emptycard"><div class="et">Nothing has changed near ' + HS.esc(place) + ' in the last ' + CHANGE_DAYS + ' days</div>'
        + '<p class="ed">No new filings, hearings, or official notices in that window — that\'s worth knowing too. We keep watching the record daily.</p>'
        + '<button class="btn primary" id="chgShowAll">Show all projects</button></div>';
      var sa = panel.querySelector('#chgShowAll');
      if (sa) sa.onclick = function () { setView('all'); };
      return;
    }

    var html = '<div class="listhead"><b>' + (mapped.length + areaChg.length) + '</b> change'
      + (mapped.length + areaChg.length === 1 ? '' : 's') + ' near ' + HS.esc(place) + ' · last ' + CHANGE_DAYS + ' days</div>'
      + '<p class="chgnote">Drawn from dates on the public record — new filings, scheduled hearings, and official notices. We only show changes the record itself supports.</p>'
      + '<div class="groupHead" style="margin-top:0">Recent changes</div>'
      + mapped.map(function (e, i) { return entryCard(e, i, 'data-chg'); }).join('');
    if (areaChg.length) {
      html += '<div class="groupHead">Area-wide · affect the whole area</div>'
        + areaChg.map(function (e, i) { return entryCard(e, i, 'data-chgarea'); }).join('');
    }
    panel.innerHTML = html;

    function wire(sel, act) {
      panel.querySelectorAll(sel).forEach(function (el) {
        el.addEventListener('click', function () { act(el); });
        el.addEventListener('keydown', function (ev) { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); act(el); } });
      });
    }
    wire('[data-chg]', function (el) {
      var e = mapped[parseInt(el.getAttribute('data-chg'), 10)]; if (!e) return;
      var it = byId[e.id];
      centerOn(it);
      openItem(it);            // the EXISTING Project Intelligence panel
    });
    wire('[data-chgarea]', function (el) {
      var e = areaChg[parseInt(el.getAttribute('data-chgarea'), 10)];
      if (e && e.item.source_ref) window.open(e.item.source_ref, '_blank', 'noopener');
    });
  }

  // Center the live map on one record's pin (What's-Changed click-through).
  // The schematic is a fixed home/centroid-anchored projection, so it doesn't
  // re-anchor — the detail panel still opens there.
  function centerOn(it) {
    if (!it || it.lat == null || it.lng == null || opts.mode === 'impact') return;
    try {
      if (glMap && glReady && !glFailed) glMap.easeTo({ center: [it.lng, it.lat], duration: 400 });
      else if (lfMap && !lfFailed) lfMap.panTo([it.lat, it.lng]);
    } catch (e) { /* centering is best-effort — the panel is the payload */ }
  }

  // The 6-section project information panel (Sprint-1 spec). Every field renders only
  // from the real record; anything the record doesn't state is said to be absent, never guessed.
  function renderDetail(it) {
    var mk = HS.resolveMarker(it);
    var title = it.name || it.title || 'Project';
    var typeLabel = mk.typeLabel || it.type || it.category || 'Record';
    var status = it.status || '';
    var statusClass = status === 'Active' || status === 'Operating' || status === 'Built' ? 'active'
      : status === 'Approved' ? 'appr' : status === 'Proposed' ? 'prop' : '';

      h.title='Your home · '+HS.homeAddressLine(home);
      glMarkers.push(new maplibregl.Marker({element:h}).setLngLat([center.lng,center.lat])
        .setPopup(new maplibregl.Popup({offset:16,maxWidth:'260px'}).setHTML(HS.homePopupHTML(home))).addTo(glMap));
    }
    items.forEach(function(it){
      var el=pinEl(it, 26);
      el.title=(it.name||it.title||'')+' · '+(it.type||it.category||'')+(it.status?' · '+it.status:'');
      el.addEventListener('click', function(e){ e.stopPropagation(); openItem(it); });
      glMarkers.push(new maplibregl.Marker({element:el}).setLngLat([it.lng,it.lat]).addTo(glMap));
    });
    if (opts.showFacilities) unletteredFacs(items).forEach(function(f){
      var fmk = HS.resolveMarker(Object.assign({}, f, { _facility: true, record_kind: 'facility' }));
      var el=document.createElement('div');
      el.className='hspin';
      el.style.cssText='width:20px;height:20px;line-height:0;cursor:pointer';
      el.innerHTML=HS.markerSVG(fmk.shape, fmk.color, '', 20);
      el.setAttribute('role','button');
      el.setAttribute('aria-label', fmk.popupLabel);
      glMarkers.push(new maplibregl.Marker({element:el}).setLngLat([f.lng,f.lat])
        .setPopup(new maplibregl.Popup({offset:12,maxWidth:'260px'}).setHTML(facPopupHTML(f))).addTo(glMap));
    });
  }
  function facPopupHTML(f){
    var interp = HS.fac.interpret(f.facility_env || null);
    return '<div style="font:600 13px/1.3 var(--font)">'+HS.esc(f.name)+'</div>'
      +'<div style="font-size:11px;color:#5a6b63">Regulated facility'+(f.dist?' · '+HS.esc(f.dist):'')+'</div>'
      +(interp?'<div style="font-size:11px;color:#5a6b63">'+HS.esc(interp.line)+'</div>':'')
      +'<a href="development.html?id='+encodeURIComponent(f.id)+'" style="font-size:11.5px;color:#157a49;font-weight:600">Facility record ▸</a>';
  }
  function ensureGL(){
    if (glMap) return;
    try {
      glMap = new maplibregl.Map({
      container:'mapgl',
      style:{ version:8, sources:{
        sat:{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256,attribution:'© Esri, Maxar'},
        osm:{type:'raster',tiles:['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png','https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'}
      }, layers:[
        {id:'osm',type:'raster',source:'osm',layout:{visibility:'none'}},
        {id:'sat',type:'raster',source:'sat',layout:{visibility:'none'}}
      ]},
      center:[center.lng,center.lat], zoom: zoomFor(opts.radiusMi)
      });
    } catch (e) {
      console.warn('[maps] WebGL unavailable — showing the impact diagram.', e);
      glMap = null;
      degradeToSchematic();
      return;
    }
    glMap.addControl(new maplibregl.NavigationControl({showCompass:false}), 'top-right');
    glMap.on('error', function(ev){
      if (!ev) return;
      var src = ev.sourceId, msg = ev.error && String(ev.error.message || ev.error);
      console.warn('[maps] gl error', src || '(no source)', msg || ev);
      if (msg && /webgl/i.test(msg)) { degradeToSchematic(); return; }
      if (src==='sat' || src==='osm' || (msg && /429|rate|tile|failed to fetch|network/i.test(msg))) {
        if (++glTileErrs >= 4) degradeToSchematic();
      }
    });
    glMap.on('data', function(ev){
      if (ev && ev.tile && (ev.sourceId==='sat' || ev.sourceId==='osm')) glTilesOK++;
    });
    setTimeout(function(){ if (!glReady) degradeToSchematic(); }, 9000);
    glMap.on('load', function(){
      setTimeout(function(){
        if (!glFailed && glTilesOK === 0 && opts.mode !== 'impact') {
          console.warn('[maps] no raster tiles painted after load — degrading (tilesOK=0, errs=' + glTileErrs + ')');
          degradeToSchematic();
        }
      }, 8000);
    });
    glMap.on('load', function(){
      glMap.addSource('radius',{type:'geojson',data:circle(center.lat,center.lng,opts.radiusMi)});
      // A white casing UNDER the green dashed line so the ring reads on any basemap —
      // satellite imagery and street tiles are busy, and a bare thin green line
      // vanishes into them (why the ring looked "missing" outside the Impact view).
      glMap.addLayer({id:'radius-fill',type:'fill',source:'radius',paint:{'fill-color':'#157a49','fill-opacity':0.10}});
      glMap.addLayer({id:'radius-casing',type:'line',source:'radius',paint:{'line-color':'#ffffff','line-width':5,'line-opacity':0.85}});
      glMap.addLayer({id:'radius-line',type:'line',source:'radius',paint:{'line-color':'#157a49','line-width':2.5,'line-opacity':1,'line-dasharray':[2,2]}});
      glReady=true; drawGL();
    });
  }
  function drawGL(){
    var items = shownItems();
    document.getElementById('mapSch').style.display='none';
    document.getElementById('maplf').style.display='none';
    document.getElementById('mapgl').style.display='block';
    ensureGL();
    if (glFailed || !glMap) return;
    if (!glReady){ setGps(items); renderInfo(items); return; }
    glMap.resize();
    glMap.setLayoutProperty('sat','visibility', opts.mode==='satellite'?'visible':'none');
    glMap.setLayoutProperty('osm','visibility', opts.mode==='street'?'visible':'none');
    glMap.getSource('radius').setData(opts.showRadius ? circle(center.lat,center.lng,opts.radiusMi) : {type:'FeatureCollection',features:[]});
    ['radius-fill','radius-casing','radius-line'].forEach(function(id){
      glMap.setLayoutProperty(id,'visibility', opts.showRadius?'visible':'none');
    });
    var wantZoom = zoomFor(opts.radiusMi);
    if (glLastView !== center.lat + ',' + center.lng + '@' + wantZoom) {
      glLastView = center.lat + ',' + center.lng + '@' + wantZoom;
      glMap.easeTo({ center:[center.lng,center.lat], zoom: wantZoom, duration:300 });
    }
    addMarkers(items);
    setGps(items); renderInfo(items);
    wirePanel(drawGL);
  }

  // ---------- Leaflet raster fallback (real tiles WITHOUT WebGL) ----------
  var lfMap=null, lfSat=null, lfOsm=null, lfBase=null, lfRadius=null, lfMarkers=[],
      lfFailed=false, lfTilesOK=0, lfTileErrs=0, lfWatchdogArmed=false, lfLastView=null;
  var loadLeaflet = HS.loadLeaflet;
  function lfDivIcon(html,size){ return L.divIcon({html:html, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2]}); }
  function clearLfMarkers(){ lfMarkers.forEach(function(m){ try{ lfMap.removeLayer(m); }catch(e){} }); lfMarkers=[]; }
  function addLfMarkers(items){
    clearLfMarkers();
    if (hasRealHome) {
      lfMarkers.push(L.marker([center.lat,center.lng],{zIndexOffset:1000,icon:lfDivIcon(HS.homeMarkerHTML(26),26),
          title:'Your home · '+HS.homeAddressLine(home)})
        .bindPopup(HS.homePopupHTML(home),{maxWidth:260}).addTo(lfMap));
    }
    items.forEach(function(it){
      var mk = HS.resolveMarker(it);
      var m = L.marker([it.lat,it.lng],{icon:lfDivIcon('<div class="hspin" style="line-height:0">'+HS.markerSVG(mk.shape, mk.color, it._letter||'', 26)+'</div>',26),
          title:(it.name||it.title||'')+' · '+(it.type||it.category||'')})
        .addTo(lfMap);
      m.on('click', function(){ openItem(it); });
      lfMarkers.push(m);
    });
    if (opts.showFacilities) unletteredFacs(items).forEach(function(f){
      var fmk = HS.resolveMarker(Object.assign({}, f, { _facility: true, record_kind: 'facility' }));
      lfMarkers.push(L.marker([f.lat,f.lng],{icon:lfDivIcon('<div style="line-height:0">'+HS.markerSVG(fmk.shape, fmk.color, '', 20)+'</div>',20)})
        .bindPopup(facPopupHTML(f),{maxWidth:260}).addTo(lfMap));
    });
  }
  function lfFail(){
    if (lfFailed) { schematicFinal(); return; }
    lfFailed = true;
    try { if (lfMap) lfMap.remove(); } catch (e) {}
    lfMap = null;
    schematicFinal();
  }
  function drawLF(){
    var items = shownItems();
    document.getElementById('mapSch').style.display='none';
    document.getElementById('mapgl').style.display='none';
    document.getElementById('maplf').style.display='block';
    if (!lfMap){
      lfMap = L.map('maplf', { zoomSnap: 0.2 });
      if (lfMap.attributionControl) lfMap.attributionControl.setPrefix(
        '<a href="https://leafletjs.com" title="A JavaScript library for interactive maps">Leaflet</a>');
      lfSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution:'© Esri, Maxar', maxZoom:19});
      lfOsm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap', maxZoom:19, subdomains:'abc'});
      [lfSat,lfOsm].forEach(function(t){
        t.on('tileload',  function(){ lfTilesOK++; });
        t.on('tileerror', function(){ if (++lfTileErrs >= 4 && lfTilesOK === 0) lfFail(); });
      });
    }
    if (!lfWatchdogArmed){
      lfWatchdogArmed = true;
      setTimeout(function(){
        if (!lfFailed && lfMap && lfTilesOK === 0 && opts.mode !== 'impact') {
          console.warn('[maps] no raster tiles painted on the fallback map — showing the impact diagram.');
          lfFail();
        }
      }, 8000);
    }
    var want = (opts.mode === 'street') ? lfOsm : lfSat;
    if (lfBase !== want){ if (lfBase) lfMap.removeLayer(lfBase); want.addTo(lfMap); lfBase = want; }
    var lfWantView = center.lat + ',' + center.lng + '@' + zoomFor(opts.radiusMi);
    if (lfLastView !== lfWantView) { lfLastView = lfWantView; lfMap.setView([center.lat, center.lng], zoomFor(opts.radiusMi)); }
    if (lfRadius){ lfMap.removeLayer(lfRadius); lfRadius = null; }
    if (opts.showRadius) {
      var rM = opts.radiusMi*1609.34, clat=+center.lat, clng=+center.lng;   // coerce: DB home coords may be strings
      // White casing under the green dashed ring — same reason as the GL map: a bare
      // thin green line disappears into satellite imagery / street tiles.
      lfRadius = L.layerGroup([
        L.circle([clat,clng], { radius: rM, color:'#ffffff', weight:5, opacity:0.85, fill:false }),
        L.circle([clat,clng], { radius: rM, color:'#157a49', weight:2.5, opacity:1, dashArray:'4 4', fillColor:'#157a49', fillOpacity:0.10 })
      ]).addTo(lfMap);
    }
    addLfMarkers(items);
    setGps(items); renderInfo(items);
    wirePanel(drawLF);
  }
  function drawTiles(){
    if (!center) { setActiveMode('impact'); showSchematic(); return; }
    if (!glFailed && window.maplibregl) { drawGL(); return; }
    if (lfFailed) { schematicFinal(); return; }
    loadLeaflet(function(ok){
      if (opts.mode === 'impact') return;
      if (ok && !lfFailed) drawLF(); else lfFail();
    });
  }

  function showSchematic(){
    document.getElementById('mapgl').style.display='none';
    document.getElementById('maplf').style.display='none';
    document.getElementById('mapSch').style.display='block';
    drawSchematic();
  }
  function setActiveMode(mode){
    opts.mode = mode;
    var seg = document.getElementById('mapMode');
    [].forEach.call(seg.querySelectorAll('button'), function(b){ b.classList.toggle('on', b.dataset.mode === mode); });
  }
  function degradeToSchematic(){
    if (glFailed) return;
    glFailed = true;
    try { if (glMap) glMap.remove(); } catch (e) {}
    glMap = null; glReady = false;
    if (opts.mode === 'impact') { showSchematic(); return; }
    drawTiles();
  }
  var tilesDead = false;
  function schematicFinal(){
    if (!tilesDead){
      tilesDead = true;
      var seg = document.getElementById('mapMode');
      ['satellite','street'].forEach(function(m){
        var b = seg.querySelector('[data-mode="'+m+'"]'); if (!b) return;
        b.style.opacity = '.45'; b.setAttribute('aria-disabled','true');
        b.title = "Live map imagery isn't available in this browser or network right now";
      });
      if (HS.toast) HS.toast("Live map imagery isn't loading right now — showing a simplified view of the same projects.");
    }
    setActiveMode('impact');
    showSchematic();
  }

  if (all.length || facs.length) {
    setActiveMode('satellite');
    drawTiles();
  } else {
    setActiveMode('impact');
    showSchematic();
  }

  // View toggle: All Projects <-> What's Changed. Switching lands on the new
  // view's LIST (any open detail closes), and the CI-checked default stays 'all'.
  function setView(v) {
    if (opts.view === v) return;
    opts.view = v;
    selected = null;
    var seg = document.getElementById('viewSeg');
    [].forEach.call(seg.querySelectorAll('button'), function (b) {
      var on = b.dataset.view === v;
      b.classList.toggle('on', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    redraw();
    // What's Changed opens the Recent Changes slide-over; All Projects returns
    // to the full, unobstructed map (the whole point of map-first).
    if (v === 'changed') openPanel(); else closePanel();
  }
  document.getElementById('viewSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-view]'); if (!btn) return;
    setView(btn.dataset.view);
  });

  document.getElementById('mapMode').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-mode]'); if (!btn) return;
    if (btn.getAttribute('aria-disabled') === 'true') {
      if (HS.toast) HS.toast("Live map imagery isn't available right now — this simplified view shows the same projects.");
      return;
    }
    [].forEach.call(this.querySelectorAll('button'), function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
    opts.mode = btn.dataset.mode;
    if (opts.mode === 'impact') { showSchematic(); return; }
    drawTiles();
  });

  // Map-view radius: a dropdown menu (matches the Project types / Quality of Life pills),
  // not a click-to-cycle — the ▾ opens a real list so every radius is one click away.
  var radii = [0.5,1,1.5,2,3,5], ri = 2;
  (function setupRadiusMenu() {
    var pill = document.getElementById('radiusPill');
    var menu = document.getElementById('radiusMenu');
    function renderPill() { pill.innerHTML = '◉ Map view: ' + opts.radiusMi + ' mi ▾'; }
    menu.innerHTML = '<div class="fh">Map view radius</div>'
      + radii.map(function (r, i) {
          return '<label><input type="radio" name="hsradius" data-i="' + i + '"'
            + (i === ri ? ' checked' : '') + '><span>' + r + ' mi</span></label>';
        }).join('');
    wireMenu(pill, menu);
    menu.addEventListener('change', function (e) {
      var cb = e.target.closest('input[data-i]'); if (!cb) return;
      ri = +cb.getAttribute('data-i'); opts.radiusMi = radii[ri];
      renderPill();
      closeAllMenus();
      if (opts.mode === 'impact') showSchematic(); else drawTiles();
    });
  })();
});

// A small .ics generator for the Public Participation "Add hearing to calendar" button.
HS.mapAddToCalendar = window.mapAddToCalendar = async function (projectId) {
  var meetings = await HS.data.meetings(HS.state.zip, HS.state.activeProperty);
  var m = meetings.find(function(x){return x.related_project_id===projectId;}) || meetings[0];
  if (!m) return;
  function z(d){ return new Date(d).toISOString().replace(/[-:]/g,'').replace(/\.\d+/,''); }
  var ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//HomeSignal//EN','BEGIN:VEVENT',
    'UID:' + m.id + '@homesignal','DTSTART:' + z(m.starts_at),'SUMMARY:' + m.title,
    'LOCATION:' + (m.location||''),'DESCRIPTION:' + (m.source_ref||''),'END:VEVENT','END:VCALENDAR'].join('\r\n');
  var a = document.createElement('a');
  a.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
  a.download = (m.title||'hearing').replace(/\W+/g,'-') + '.ics'; a.click();
};
</script>
