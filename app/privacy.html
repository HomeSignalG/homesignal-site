      <div class="eyebrow">Privacy</div>
      <h1>Privacy &amp; Terms</h1>
      <p>Last updated July 2026. In plain language: we never sell your personal information, the intelligence comes from public records, and you control what you follow.</p>
    </div>
    <div class="block prose" style="max-width:840px">
      <div class="cnote"><b>The short version:</b> we never sell your personal information. The intelligence we show comes from public government records — not from tracking you. You choose which topics and locations you follow, and you can update your preferences or unsubscribe at any time.</div>

      <h2 class="bt">What we collect</h2>
      <ul>
        <li><b>Account information</b> — your email, and optionally your name, so you can save communities and receive alerts.</li>
        <li><b>Your preferences</b> — the ZIP codes, properties, and topics you choose to follow.</li>
        <li><b>Public records</b> — permits, hearings, agendas, environmental and infrastructure filings. Public data about places, not private data about you.</li>
        <li><b>Basic usage data</b> — privacy-respecting analytics to keep the product reliable.</li>
      </ul>

      <h2 class="bt">How we use it</h2>
      <p>We use your email and preferences to deliver the alerts and briefings you asked for, save your communities, and notify you about availability (new areas or Premium). Aggregate usage data helps us improve accuracy.</p>

      <h2 class="bt">What we never do</h2>
      <p>We do not sell your personal contact information, and we do not share your identity with advertisers. Alerts are based on where you choose to look — not on a hidden profile of you.</p>

      <h2 class="bt">Optional anonymized insights</h2>
      <p>When you opt in (the checkbox on the topic picker), HomeSignal may share <b>anonymized, aggregated</b> information about the topics and locations people follow — for example, "interest in data-center development rose in this county." No personal contact information is ever included, and it's off unless you choose it. Change it any time in your alert settings.</p>

      <h2 class="bt">Your choices &amp; controls</h2>
      <ul>
        <li>Change the topics and communities you follow at any time.</li>
        <li>Unsubscribe from any alert email with one click.</li>
      </ul>

      <h2 class="bt">Contact</h2>
      <p>Questions about privacy? Email <a href="mailto:hello@homesignal.net">hello@homesignal.net</a> or use the <a href="contact.html">contact page</a>.</p>

      <div class="divider"></div>

      <h2 class="bt" id="terms" style="font-size:18px">Terms of Use</h2>
      <p>HomeSignal provides intelligence about your community for informational purposes. We source from authoritative public records and present them accurately, but HomeSignal is not legal, financial, or real-estate advice — verify anything you plan to act on with the relevant authority or a qualified professional.</p>
      <p><b>Acceptable use.</b> Use HomeSignal for your own personal, non-commercial purpose of understanding and participating in your community. Don't scrape, resell, or misrepresent our intelligence, or use it to harass others.</p>
      <p><b>Accuracy &amp; availability.</b> Public records can be incomplete, delayed, or amended. We show confidence and sources so you can judge for yourself, but can't guarantee every record is complete or current. The service is provided "as is," and features may change as the product evolves.</p>
