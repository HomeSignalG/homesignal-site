<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HomeSignal — Dashboard</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://qwnnmljucajnexpxdgxr.supabase.co wss://qwnnmljucajnexpxdgxr.supabase.co; form-action 'self'">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="dash">
<template id="hs-content">
  <div class="page">
    <div class="ph">
      <div class="eyebrow">Dashboard</div>
      <h1 id="dashHi">Welcome back</h1>
      <p id="dashSub"></p>
    </div>
    <div class="strip" id="dashStrip"></div>
    <div class="cols">
      <div>
        <div class="block" style="padding:16px 18px">
          <div class="bt-row"><h2>What's changing around you</h2><a href="maps.html">Open full map →</a></div>
          <div class="mapwrap" id="dashMap" style="box-shadow:none"></div>
        </div>
        <div class="bt-row"><h2 style="font-size:15px;margin:0">Recent — ranked by impact on you</h2><a href="alerts.html" style="font-size:12.5px;color:var(--green);text-decoration:none;font-weight:600">All alerts →</a></div>
        <div id="dashRecent"></div>
      </div>
      <div>
        <div class="block">
          <div class="bt-row"><h2>Your properties</h2><a href="properties.html">Manage →</a></div>
          <div id="dashProps"></div>
          <button class="addbtn" style="width:100%;justify-content:center;margin-top:10px" onclick="HS.openLoc()">+ Add a property</button>
        </div>
        <div class="block">
          <div class="bt-row"><h2>Your watchlist</h2><a href="#" onclick="alert('Watchlist edit — persists to watchlist_items');return false">Edit</a></div>
          <div class="chips" id="dashWatch"></div>
        </div>
        <div class="block">
          <h2 class="bt">Upcoming meetings</h2>
          <div id="dashMeetings"></div>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="config.js"></script>
<script src="seed/delvalle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/data.js"></script>
<script src="lib/templates.js"></script>
<script src="lib/map.js"></script>
<script src="shell.js"></script>
<script>
HS.onReady(async function () {
  var S = HS.state, home = S.activeProperty;
  var c = await HS.data.community(S.zip);
  var projects = await HS.data.projects(S.zip, home);
  var changes = await HS.data.changes(S.zip, home);
  var meetings = await HS.data.meetings(S.zip, home);

  var name = (S.session && S.session.name || 'there').split(' ')[0];
  document.getElementById('dashHi').textContent = 'Welcome back, ' + name;
  document.getElementById('dashSub').textContent = S.properties.length + ' home' + (S.properties.length===1?'':'s') + ' followed — here\'s what needs you across them.';

  var openCount = changes.filter(function(x){var d=HS.daysUntil(x.window_closes_at);return d!=null&&d>=0;}).length;
  document.getElementById('dashStrip').innerHTML =
    HS.tpl.statTile(projects.length, 'Projects near you', '')
    + HS.tpl.statTile(openCount, 'Action windows open', 'accent')
    + HS.tpl.statTile('<span style="font-size:19px">' + HS.esc(c.growth_pressure) + '</span>', 'Growth pressure · trending up', '')
    + HS.tpl.statTile(c.community_score, 'Community score', 'g');

  // schematic map preview (impact-colored pins)
  var items = changes.filter(function(x){return !x.quiet;}).concat(projects).slice(0, 6);
  HS.MapProvider.render(document.getElementById('dashMap'), { home: home, items: items, radiusMi: 1.5, w: 640, h: 300 });

  // recent — ranked by impact
  var recent = changes.filter(function(x){return !x.quiet;})
    .sort(function(a,b){return (b.impacts?b.impacts.length:0)-(a.impacts?a.impacts.length:0);}).slice(0,2);
  document.getElementById('dashRecent').innerHTML = recent.map(function(ch){ return HS.tpl.miniCard(ch, ch.category); }).join('');

  // properties
  document.getElementById('dashProps').innerHTML = S.properties.map(function(p){
    return '<div class="swrow" onclick="HS.selectProperty(\'' + p.id + '\');location.href=\'property.html?id=' + p.id + '\'">'
      + '<div class="miniscore">' + (p.score||'') + '</div>'
      + '<div class="pinfo"><div class="pt">' + HS.esc(p.address) + ' <span style="font-size:10px;color:var(--green);font-weight:700">· ' + HS.esc((p.tag||p.label).toUpperCase()) + '</span></div>'
      + '<div class="pa">' + HS.esc(p.city) + '</div></div></div>';
  }).join('');

  // watchlist (seeded from real entities near this home)
  var watch = [c.zip, 'SH-130 Data Center', 'SH-71', 'Your street', 'Colorado River'];
  document.getElementById('dashWatch').innerHTML = watch.map(function(w){return '<span class="wchip">' + HS.esc(w) + '</span>';}).join('');

  document.getElementById('dashMeetings').innerHTML = meetings.map(HS.tpl.meetingRow).join('');
});
</script>
</body>
</html>
