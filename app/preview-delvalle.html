<script>
// HomeSignal data layer — ONE interface, two backends.
//   DATA_SOURCE='seed'      -> reads window.HS_SEED (runs the whole app with zero DB; the review path)
//   DATA_SOURCE='supabase'  -> reads the live project with the anon key (RLS-gated)
// Every read is async so pages don't care which backend is live. Distances are ALWAYS
// computed here from the active property's lat/lng (haversine now; PostGIS RPC seam noted),
// never stored — matching the prompt's "distance is computed" rule.
(function () {
  const HS = (window.HS = window.HS || {});
  const CFG = window.HS_CONFIG;

  // --- Supabase client (only created if/when needed; jsDelivr build matches the live CSP) ---
  let _sb = null;
  function sb() {
    if (!_sb && window.supabase) _sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    return _sb;
  }
  HS.sb = sb;

  // --- geo: haversine miles (client-side seed path). Supabase path uses an ST_Distance RPC. ---
  function distanceMi(aLat, aLng, bLat, bLng) {
    if ([aLat, aLng, bLat, bLng].some(v => v == null || isNaN(v))) return null;
    const R = 3958.7613, toR = d => (d * Math.PI) / 180;
    const dLat = toR(bLat - aLat), dLng = toR(bLng - aLng);
    const s = Math.sin(dLat / 2) ** 2 +
      Math.cos(toR(aLat)) * Math.cos(toR(bLat)) * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.asin(Math.min(1, Math.sqrt(s)));
  }
  function fmtMi(mi) { return mi == null ? '' : (mi < 10 ? mi.toFixed(1) : Math.round(mi)) + ' mi'; }
  HS.distanceMi = distanceMi;
  HS.fmtMi = fmtMi;

  // Attach a computed `.distance_mi` (+ formatted `.dist`) to items relative to a home point.
  function withDistance(items, home) {
    const hLat = home && home.lat, hLng = home && home.lng;
    return (items || []).map(it => {
      const mi = distanceMi(hLat, hLng, it.lat, it.lng);
      return Object.assign({}, it, { distance_mi: mi, dist: fmtMi(mi) });
    });
  }
  HS.withDistance = withDistance;

  const isSeed = () => (CFG.DATA_SOURCE || 'seed') === 'seed';

  // ---------------------------------------------------------------- reads ----
  const data = {
    async community(zip) {
      zip = zip || CFG.DEFAULT_ZIP;
      if (isSeed()) {
        const c = window.HS_SEED.community;
        return c.zip === zip ? c : null;
      }
      const { data } = await sb().from('communities')
        .select('*').contains('zip_codes', [zip]).limit(1);
      return (data && data[0]) || null;
    },
    async coverage() {
      if (isSeed()) return window.HS_SEED.coverage.slice();
      // live: resolve against communities.zip_codes; a ZIP present == covered.
      return null;
    },
    async isCovered(zip) {
      if (isSeed()) return window.HS_SEED.coverage.some(c => c.zip === zip && c.covered);
      const { data } = await sb().from('communities')
        .select('id').contains('zip_codes', [zip]).limit(1);
      return !!(data && data.length);
    },
    async projects(zip, home) {
      const list = isSeed() ? window.HS_SEED.projects.slice() : await _sbList('projects', zip);
      return withDistance(list, home);
    },
    async changes(zip, home) {
      const list = isSeed() ? window.HS_SEED.changes.slice() : await _sbList('changes', zip);
      return withDistance(list, home);
    },
    async meetings(zip, home) {
      const list = isSeed() ? window.HS_SEED.meetings.slice() : await _sbList('meetings', zip);
      return withDistance(list, home);
    },
    async envRisk(zip) {
      zip = zip || CFG.DEFAULT_ZIP;
      if (isSeed()) return window.HS_SEED.environmental_risk[zip] || null;
      const { data } = await sb().from('environmental_risk')
        .select('*').eq('zip', zip).limit(1);
      return (data && data[0]) || null;
    },
    async properties() {
      // In seed/demo mode the demo user's homes; in live mode the signed-in user's `properties`.
      if (isSeed()) return withDistance(window.HS_SEED.properties.slice(), null)
        .map(p => Object.assign({}, p)); // properties are homes themselves
      if (!HS.state.session) return [];
      const { data } = await sb().from('properties')
        .select('*').eq('user_id', HS.state.session.user.id).order('created_at');
      return data || [];
    },
    topicCategories() {
      return isSeed() ? window.HS_SEED.topicCategories : window.HS_SEED.topicCategories; // taxonomy same either way
    },
    project(id, list) { return (list || []).find(p => p.id === id) || null; }
  };
  async function _sbList(table, zip) {
    const { data } = await sb().from(table).select('*').eq('zip', zip || CFG.DEFAULT_ZIP);
    return data || [];
  }
  HS.data = data;
})();

</script>
<script>
// HomeSignal component templates — small vanilla functions that turn data into the
// mockup's component vocabulary (story card, impact chips, score ring/bars, timeline
// thread, meeting rows, stat tiles). Markup mirrors homesignalphase1_13.html verbatim.
(function () {
  const HS = (window.HS = window.HS || {});
  const esc = s => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
  HS.esc = esc;

  // color a card's left bar from impact score / status
  function barColor(item) {
    if (item.status === 'Active') return 'var(--amber)';
    if (item.status === 'Approved') return 'var(--blue)';
    const s = item.impact_score != null ? item.impact_score : (item.confidence === 'High' ? 80 : 40);
    if (s >= 75) return 'var(--red)';
    if (s >= 45) return 'var(--amber)';
    if (item.impacts && item.impacts.every(i => !i.bad)) return 'var(--green-2)';
    return 'var(--blue)';
  }
  HS.barColor = barColor;

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr), now = new Date();
    return Math.ceil((d - now) / 86400000);
  }
  HS.daysUntil = daysUntil;

  function fmtDate(dateStr, opts) {
    if (!dateStr) return '';
    try { return new Date(dateStr).toLocaleDateString('en-US',
      opts || { month: 'short', day: 'numeric' }); } catch (e) { return dateStr; }
  }
  HS.fmtDate = fmtDate;

  const arrow = dir => dir === 'down' ? '↓' : '↑';

  const tpl = {
    impactChips(impacts) {
      return (impacts || []).map(i =>
        `<span class="ichip ${i.bad ? 'bad' : 'good'}"><span class="cd ${esc(i.k)}"></span>${esc(i.label)} <span class="ar">${arrow(i.dir)}</span></span>`
      ).join('');
    },

    windowPill(item) {
      const d = daysUntil(item.window_closes_at);
      if (item.window_closes_at && d != null && d >= 0)
        return `<span class="win">◔ ${d === 0 ? 'Window closes today' : 'Window closes in ' + d + ' day' + (d === 1 ? '' : 's')}</span>`;
      if (item.category && /water|environment/i.test(item.category) && item.confidence === 'Medium')
        return `<span class="win soft">Advisory possible</span>`;
      return '';
    },

    // Full alerts story card
    storyCard(c) {
      const why = c.why ? `
        <details class="why"><summary>ⓘ Why you're seeing this</summary>
          <div class="wbody">
            ${c.why.source ? `<div class="r"><b>Source:</b> ${esc(c.why.source)}</div>` : ''}
            ${c.why.rank ? `<div class="r"><b>Why it ranks high for you:</b> ${esc(c.why.rank)}</div>` : ''}
            ${c.why.confidence ? `<div class="r"><b>Confidence:</b> ${esc(c.why.confidence)}</div>` : ''}
          </div></details>` : '';
      const win = tpl.windowPill(c);
      const beat = c.beat ? `<span style="color:var(--ink-3)">${esc(c.beat)}</span>` : '';
      const href = c.related_project_id ? `development.html?id=${encodeURIComponent(c.related_project_id)}` : (c.source_ref || '#');
      return `
      <div class="card" style="border-left-color:${barColor(c)}">
        <span class="lens"><span class="sw ${esc(c.lens || 'traffic')}"></span>${esc(c.category || '')}</span>
        <h3>${esc(c.title)}</h3>
        <p class="sowhat"><b>What it means for you:</b> ${esc(c.plain_language)}</p>
        <div class="impacts">${tpl.impactChips(c.impacts)}</div>
        ${why}
        <div class="foot">
          <div class="meta">${win || beat}${c.dist ? `<span class="dist">${esc(c.dist)}</span>` : ''}</div>
          <div class="actions">${tpl.cardActions(c)}</div>
        </div>
      </div>`;
    },

    cardActions(c) {
      if (c.related_project_id)
        return `<button class="btn primary" onclick="location.href='development.html?id=${encodeURIComponent(c.related_project_id)}'">See detail →</button>`;
      const ref = c.source_ref
        ? `<button class="btn" onclick="window.open('${esc(c.source_ref)}','_blank','noopener')">Read →</button>` : '';
      return ref + `<button class="btn ghost" onclick="HS.toggleFollow(this,'change','${esc(c.id)}')">Notify me</button>`;
    },

    // compact card (dashboard / maps / community / property)
    miniCard(item, lensLabel) {
      return `
      <div class="card mini" style="border-left-color:${barColor(item)}">
        <span class="lens"><span class="sw ${esc(item.lens || 'traffic')}"></span>${esc(lensLabel || item.category || '')}</span>
        <h3>${esc(item.title || item.name)}</h3>
        <p class="sowhat">${item.plain_language ? '<b>What it means for you:</b> ' + esc(item.plain_language) : esc(item.sowhat || '')}</p>
        <div class="impacts">${tpl.impactChips(item.impacts || item.impact_dimensions)}</div>
      </div>`;
    },

    // clickable development project card
    devCard(p) {
      const statusClass = p.status === 'Active' ? 'active' : p.status === 'Approved' ? 'appr' : 'prop';
      return `
      <div class="card clickable" style="border-left-color:${barColor(p)}" onclick="location.href='development.html?id=${encodeURIComponent(p.id)}'">
        <span class="lens"><span class="sw ${esc(p.lens || 'value')}"></span>${esc(p.status)} · ${esc(p.dist || p.type)}</span>
        <h3>${esc(p.name)}</h3>
        <p class="sowhat"><b>How it lands on you:</b> ${esc(p.sowhat || '')}</p>
        <div class="impacts">${tpl.impactChips(p.impact_dimensions)}</div>
        <div class="foot">
          <div class="meta"><span style="color:var(--ink-3)">${esc(p.stage || '')}</span>${p.dist ? `<span class="dist">${esc(p.dist)}</span>` : ''}</div>
          <div class="actions"><span class="status ${statusClass}">${esc(p.status)}</span></div>
        </div>
      </div>`;
    },

    statTile(n, label, cls) {
      return `<div class="stat ${cls || ''}"><div class="n">${n}</div><div class="l">${esc(label)}</div></div>`;
    },

    scoreRing(score, pct) {
      const p = pct != null ? pct : score;
      return `<div class="ring" style="--p:${p}"><div class="in">${esc(score)}</div></div>`;
    },

    scoreBars(components) {
      return Object.keys(components || {}).map(k => {
        const c = components[k], label = k.replace(/_/g, ' ').replace(/\b\w/g, m => m.toUpperCase());
        const fill = c.tone === 'blue' ? 'var(--blue)' : c.tone === 'green-2' ? 'var(--green-2)' : 'var(--amber)';
        return `<div class="sb"><div class="sl"><span>${esc(label)}</span><b>${esc(c.label)}</b></div>
          <div class="track"><div class="fill" style="width:${c.pct}%;background:${fill}"></div></div></div>`;
      }).join('');
    },

    thread(events) {
      return (events || []).map(e => `
        <div class="tev ${e.future ? 'future' : ''}"><span class="tk"></span><div>
          <div class="td">${esc(e.date)}</div><div class="tt">${esc(e.title)}</div>
          ${e.link ? `<div class="tl">↳ ${esc(e.link)}</div>` : ''}</div></div>`).join('');
    },

    meetingRow(m) {
      const when = fmtDate(m.starts_at) + ' · ' +
        new Date(m.starts_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Chicago' });
      const d = daysUntil(m.window_closes_at || m.starts_at);
      return `<div class="aw"><span class="ak"></span><div>
        <div class="at">${esc(m.title || m.body)}</div>
        <div class="ad">${esc(when)}${m.location ? ' · ' + esc(m.location) : ''}</div>
        ${d != null && d >= 0 && d <= 10 ? `<div class="au">${d === 0 ? 'Today' : d + ' day' + (d === 1 ? '' : 's') + ' away'}</div>` : ''}
      </div></div>`;
    }
  };
  HS.tpl = tpl;
})();

</script>
<script>
// HomeSignal schematic map — the mockup's vector map, but data-driven and behind a
// swappable MapProvider seam (a real tile provider — Mapbox/Google — can replace
// `render` later without changing callers). No paid provider is hardcoded.
(function () {
  const HS = (window.HS = window.HS || {});

  // impact tier -> pin color (matches the mockup legend)
  function tier(item) {
    const s = item.impact_score != null ? item.impact_score
      : (item.confidence === 'High' ? 80 : item.confidence === 'Medium' ? 55 : 40);
    if (item.status === 'Approved') return { c: 'var(--blue)', k: 'watch' };
    if (item.impacts && item.impacts.length && item.impacts.every(i => !i.bad) && (item.distance_mi || 0) > 3)
      return { c: 'var(--green-2)', k: 'positive' };
    if (s >= 75) return { c: 'var(--red)', k: 'high' };
    if (s >= 45) return { c: 'var(--amber)', k: 'moderate' };
    return { c: 'var(--blue)', k: 'watch' };
  }
  HS.mapTier = tier;

  const MapProvider = {
    name: 'schematic',
    // render into `el`; returns [{letter,item,color}] in draw order for a synced pin list
    render(el, opts) {
      const { home, items = [], radiusMi = 1.5, showRadius = true, w = 780, h = 520 } = opts;
      const cx = w / 2, cy = h / 2, radiusPx = Math.min(w, h) * 0.29;
      const pxPerMile = radiusPx / radiusMi;
      const hLat = home ? home.lat : (items[0] && items[0].lat) || 0;
      const hLng = home ? home.lng : (items[0] && items[0].lng) || 0;
      const place = (lat, lng) => {
        const north = (lat - hLat) * 69;               // mi north
        const east = (lng - hLng) * 69 * Math.cos(hLat * Math.PI / 180); // mi east
        return { x: Math.max(20, Math.min(w - 20, cx + east * pxPerMile)),
                 y: Math.max(20, Math.min(h - 20, cy - north * pxPerMile)) };
      };
      const letters = 'ABCDEFGHIJKLMNOP';
      const shown = items.slice(0, letters.length);
      const pins = shown.map((it, i) => {
        const p = place(it.lat, it.lng), t = tier(it);
        return { letter: letters[i], item: it, color: t.c, x: p.x, y: p.y };
      });
      const bg = `
        <rect width="${w}" height="${h}" fill="#e4eadd"/>
        <path d="M40 60 Q120 40 190 90 Q250 130 240 200 Q150 190 60 172 Q30 110 40 60 Z" fill="#d3e0c6"/>
        <rect x="${w-235}" y="${h-190}" width="185" height="160" rx="18" fill="#d3e0c6"/>
        <path d="M60 ${h*0.63} Q150 ${h*0.58} 215 ${h*0.66} Q255 ${h*0.72} 212 ${h*0.82} Q150 ${h*0.9} 72 ${h*0.87} Q22 ${h*0.77} 60 ${h*0.63} Z" fill="#bcd6e2"/>
        <path d="M0 ${cy+5} H${w}" stroke="#f4f2ec" stroke-width="14"/>
        <path d="M${cx} 0 V${h}" stroke="#f4f2ec" stroke-width="12"/>`;
      const radius = showRadius ? `
        <circle cx="${cx}" cy="${cy}" r="${radiusPx}" fill="#157a49" fill-opacity="0.07" stroke="#157a49" stroke-opacity="0.35" stroke-dasharray="7 7"/>
        <text x="${cx}" y="${cy-radiusPx-6}" font-size="11" fill="#157a49" text-anchor="middle" font-family="sans-serif" opacity="0.8">${radiusMi} mi impact radius</text>` : '';
      const homeMark = `
        <circle cx="${cx}" cy="${cy}" r="12" fill="#157a49" stroke="#fff" stroke-width="3"/>
        <text x="${cx}" y="${cy+31}" font-size="11" fill="#16211c" text-anchor="middle" font-weight="700" font-family="sans-serif">Your home</text>`;
      const pinSvg = pins.map(p => `<g><circle cx="${p.x}" cy="${p.y}" r="15" fill="${p.color}" stroke="#fff" stroke-width="3"/>
        <text x="${p.x}" y="${p.y+5}" font-size="13" fill="#fff" text-anchor="middle" font-weight="700" font-family="sans-serif">${p.letter}</text></g>`).join('');
      el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${bg}${radius}${homeMark}${pinSvg}</svg>`;
      return pins;
    }
  };
  HS.MapProvider = MapProvider;
})();

</script>
<script>
// HomeSignal shell orchestrator (classic script, no build step).
// Injects partials/shell.html into every page, wires the shared chrome (nav, mobile
// drawer, all 5 modals, search, share, topics, property switcher, follows, waitlist,
// contact/community-request), boots session + active-property state, then hands control
// to the page via HS.onReady(). Persistence: seed mode -> localStorage; supabase mode -> DB.
(function () {
  const HS = (window.HS = window.HS || {});
  const CFG = window.HS_CONFIG;
  const $ = (id) => document.getElementById(id);

  // ------------------------------------------------------------------ state --
  const LS = {
    get(k, d) { try { return JSON.parse(localStorage.getItem('hs:' + k)) ?? d; } catch (e) { return d; } },
    set(k, v) { try { localStorage.setItem('hs:' + k, JSON.stringify(v)); } catch (e) {} }
  };
  const state = HS.state = {
    session: null,           // {user:{id,email}} or null
    zip: CFG.DEFAULT_ZIP,
    properties: [],
    activePropId: LS.get('activeProp', null),
    follows: new Set(LS.get('follows', [])),
    dismissed: new Set(LS.get('dismissed', [])),
    topicPrefs: LS.get('topicPrefs', {}),
    get activeProperty() {
      return this.properties.find(p => p.id === this.activePropId) || this.properties[0] || null;
    }
  };

  // ------------------------------------------------------------- ready gate --
  let _resolveReady;
  HS.ready = new Promise(r => (_resolveReady = r));
  HS.onReady = (fn) => HS.ready.then(fn);

  // -------------------------------------------------------------- modals -----
  let _lastFocus = null;
  HS.openModal = function (id) {
    const el = $(id); if (!el) return;
    _lastFocus = document.activeElement;
    el.classList.add('show');
    const f = el.querySelector('input,button,[tabindex]'); if (f) f.focus();
    el._trap = trapFocus(el);
    document.addEventListener('keydown', el._trap);
  };
  HS.closeModal = function (id) {
    const el = $(id); if (!el) return;
    el.classList.remove('show');
    if (el._trap) document.removeEventListener('keydown', el._trap);
    if (_lastFocus && _lastFocus.focus) _lastFocus.focus();
  };
  function trapFocus(el) {
    return function (e) {
      if (e.key !== 'Tab') return;
      const f = el.querySelectorAll('a[href],button:not([disabled]),input,[tabindex]:not([tabindex="-1"])');
      if (!f.length) return;
      const first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') ['topicsModal', 'premiumModal', 'shareModal', 'locModal', 'switcherModal']
      .forEach(HS.closeModal);
  });

  // ------------------------------------------------------------- mobile nav --
  HS.toggleMenu = function () {
    document.querySelector('.side').classList.toggle('open');
    $('sidebackdrop').classList.toggle('show');
  };
  function closeMenu() {
    const s = document.querySelector('.side'); if (s) s.classList.remove('open');
    const b = $('sidebackdrop'); if (b) b.classList.remove('show');
  }

  // -------------------------------------------------------------- session ----
  async function bootSession() {
    if ((CFG.DATA_SOURCE === 'supabase') && window.supabase) {
      try {
        const { data } = await HS.sb().auth.getSession();
        state.session = data && data.session ? data.session : null;
      } catch (e) { state.session = null; }
    }
    if (!state.session && CFG.DEMO_SESSION) {
      const u = (window.HS_SEED && window.HS_SEED.demoUser) || { id: 'demo', email: 'demo@homesignal.net', name: 'Demo', initials: 'DE' };
      state.session = { user: { id: u.id, email: u.email }, demo: true, name: u.name, initials: u.initials };
    }
  }
  HS.requireAuth = function (thenLabel) {
    if (state.session) return true;
    // route to existing homesignal.net sign-in, returning here to complete the action
    const back = encodeURIComponent(location.href);
    HS.nav= '/index.html?signin=1&return=' + back + (thenLabel ? '&do=' + encodeURIComponent(thenLabel) : '');
    return false;
  };
  HS.onAvatar = function () {
    if (state.session && !state.session.demo) {
      if (confirm('Sign out?')) HS.sb().auth.signOut().then(() => location.reload());
    } else { HS.requireAuth(); }
  };

  // -------------------------------------------------- active property / topbar
  HS.selectProperty = function (id) {
    state.activePropId = id; LS.set('activeProp', id);
    paintTopbar();
    document.dispatchEvent(new CustomEvent('hs:property', { detail: { id } }));
  };
  function paintTopbar() {
    const p = state.activeProperty;
    if ($('locLabel')) $('locLabel').textContent = p ? p.address : (window.HS_SEED ? window.HS_SEED.community.name : '—');
    const av = $('hs-avatar');
    if (av) av.textContent = state.session ? (state.session.initials ||
      (state.session.user.email || '?').slice(0, 2).toUpperCase()) : '··';
    const commNav = $('hs-nav-comm');
    if (commNav) commNav.setAttribute('href', 'community.html?zip=' + encodeURIComponent(state.zip));
  }
  HS.openSwitcher = function () {
    const list = $('switcherList'); if (!list) return;
    $('switcherSub').textContent = "You're following " + state.properties.length + " home" +
      (state.properties.length === 1 ? '' : 's') + '. Pick one to focus the app on it.';
    list.innerHTML = state.properties.map(p => `
      <div class="swrow ${p.id === state.activePropId ? 'active' : ''}" onclick="HS.selectProperty('${p.id}');HS.closeModal('switcherModal')">
        <div class="miniscore">${p.score || ''}</div>
        <div class="pinfo"><div class="pt">${HS.esc(p.address)}</div>
          <div class="pa">${HS.esc(p.tag || p.label)} · ${HS.esc(p.city)}, ${HS.esc(p.state)} ${HS.esc(p.zip)}</div></div>
        ${p.id === state.activePropId ? '<span class="chk">✓</span>' : ''}
      </div>`).join('');
    HS.openModal('switcherModal');
  };

  // -------------------------------------------------- location / community ----
  HS.openLoc = function () {
    $('locForm').classList.remove('hidden');
    $('locRequest').classList.add('hidden');
    $('locDone').classList.add('hidden');
    const z = $('locZip'); z.value = ''; z.style.borderColor = '';
    HS.openModal('locModal');
  };
  HS.findCommunity = async function () {
    const el = $('locZip'), z = el.value.trim();
    if (!/^\d{5}$/.test(z)) { el.style.borderColor = '#c23b34'; el.focus(); return; }
    el.style.borderColor = '';
    const covered = await HS.data.isCovered(z);
    if (covered) {
      HS.nav= 'community.html?zip=' + z;
    } else {
      $('reqZipLabel').textContent = z;
      $('locForm').classList.add('hidden');
      $('locRequest').classList.remove('hidden');
    }
  };
  HS.submitRequest = async function () {
    const el = $('reqEmail'), e = el.value.trim();
    if (!e || e.indexOf('@') < 1) { el.style.borderColor = '#c23b34'; el.focus(); return; }
    await persistEmail('community_requests', { email: e, zip: $('reqZipLabel').textContent });
    $('locRequest').classList.add('hidden');
    $('locDoneH').textContent = 'Request received';
    $('locDoneP').textContent = "We'll email you the moment " + $('reqZipLabel').textContent + ' is live on HomeSignal.';
    $('locDone').classList.remove('hidden');
  };

  // -------------------------------------------------- topic picker ------------
  let TCUR = null;
  HS.openTopics = function (key) {
    TCUR = key;
    const cats = HS.data.topicCategories(), d = cats[key];
    $('tmTitle').textContent = d.title; $('tmSub').textContent = d.sub; $('tmBadge').textContent = d.badge;
    $('tmEmail').textContent = state.session ? state.session.user.email : 'sign in to save';
    const saved = state.topicPrefs[key];
    const onSet = saved ? new Set(saved.topics) : new Set(d.on.map(i => d.items[i]));
    const g = $('tmGrid'); g.innerHTML = '';
    d.items.forEach(it => {
      const on = onSet.has(it);
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'tchip' + (on ? ' on' : '');
      b.innerHTML = '<span class="box">' + (on ? '✓' : '') + '</span><span>' + HS.esc(it) + '</span>';
      b.onclick = function () { const o = b.classList.toggle('on'); b.querySelector('.box').textContent = o ? '✓' : ''; updTCount(); };
      g.appendChild(b);
    });
    // consent ALWAYS defaults unchecked unless the user previously opted in (policy > mockup)
    $('tmConsent').checked = saved ? !!saved.share_consent : false;
    $('tmForm').classList.remove('hidden'); $('tmDone').classList.add('hidden');
    updTCount(); HS.openModal('topicsModal');
  };
  function updTCount() {
    const n = document.querySelectorAll('#tmGrid .tchip.on').length;
    $('tmCount').textContent = n + ' topic' + (n === 1 ? '' : 's') + ' selected';
  }
  HS.saveTopics = async function () {
    if (!HS.requireAuth('save-topics')) return;
    const chips = [...document.querySelectorAll('#tmGrid .tchip.on span:last-child')].map(s => s.textContent);
    const cats = HS.data.topicCategories();
    state.topicPrefs[TCUR] = { topics: chips, share_consent: $('tmConsent').checked };
    LS.set('topicPrefs', state.topicPrefs);
    await persistTopics(TCUR, chips, $('tmConsent').checked);
    const cc = $('cc-' + TCUR); if (cc) cc.textContent = chips.length + ' topic' + (chips.length === 1 ? '' : 's') + ' followed';
    $('tmForm').classList.add('hidden');
    $('tmDoneMsg').textContent = "You'll be alerted about " + chips.length + ' ' + cats[TCUR].title.toLowerCase() + ' topic' + (chips.length === 1 ? '' : 's') + '.';
    $('tmDone').classList.remove('hidden');
  };

  // -------------------------------------------------- premium waitlist --------
  HS.submitWaitlist = async function () {
    const el = $('premiumEmail'), e = el.value.trim();
    if (!e || e.indexOf('@') < 1) { el.style.borderColor = '#c23b34'; el.focus(); return; }
    await persistEmail('premium_waitlist', { email: e });
    $('premiumForm').classList.add('hidden');
    $('premiumDone').classList.remove('hidden');
  };

  // -------------------------------------------------- follows / watch ---------
  HS.toggleFollow = function (btn, type, id) {
    if (!HS.requireAuth('follow')) return;
    const key = type + ':' + id;
    if (state.follows.has(key)) { state.follows.delete(key); btn.textContent = btn.dataset.follow || 'Follow'; }
    else {
      state.follows.add(key);
      btn.dataset.follow = btn.textContent;
      btn.textContent = (type === 'property') ? 'Watching ✓' : 'Following ✓';
    }
    LS.set('follows', [...state.follows]);
    persistFollow(type, id, state.follows.has(key));
  };

  // -------------------------------------------------- share -------------------
  const SHARE = [
    { t: 'Copy link', bg: 'var(--green)', ic: '⧉', fn: 'copy' },
    { t: 'Messages', bg: '#34c759', ic: '💬', u: u => 'sms:?&body=' + u },
    { t: 'Email', bg: '#7c8a82', ic: '✉', u: (u, x) => 'mailto:?subject=' + x + '&body=' + u },
    { t: 'Facebook', bg: '#1877f2', ic: 'f', u: u => 'https://www.facebook.com/sharer/sharer.php?u=' + u },
    { t: 'Nextdoor', bg: '#00b246', ic: '◍', u: u => 'https://nextdoor.com/sharekit/?source=share&body=' + u },
    { t: 'WhatsApp', bg: '#25d366', ic: '✆', u: u => 'https://wa.me/?text=' + u },
    { t: 'Telegram', bg: '#29a9eb', ic: '➤', u: (u, x) => 'https://t.me/share/url?url=' + u + '&text=' + x },
    { t: 'Signal', bg: '#3a76f0', ic: '◉', fn: 'copy' },
    { t: 'Reddit', bg: '#ff4500', ic: 'R', u: (u, x) => 'https://www.reddit.com/submit?url=' + u + '&title=' + x },
    { t: 'X', bg: '#111', ic: '𝕏', u: (u, x) => 'https://twitter.com/intent/tweet?url=' + u + '&text=' + x },
    { t: 'Bluesky', bg: '#1185fe', ic: '✦', u: (u, x) => 'https://bsky.app/intent/compose?text=' + x + '%20' + u },
    { t: 'LinkedIn', bg: '#0a66c2', ic: 'in', u: u => 'https://www.linkedin.com/sharing/share-offsite/?url=' + u }
  ];
  function shareUrl() {
    // share the current page URL (centralized, like the live site's share.js)
    return HS.shareUrlOverride || location.href;
  }
  function buildShare() {
    const grid = $('shareGrid'); if (!grid) return;
    $('shareUrl').textContent = shareUrl().replace(/^https?:\/\//, '');
    const u = encodeURIComponent(shareUrl()), x = encodeURIComponent('See what’s changing around your home on HomeSignal');
    grid.innerHTML = SHARE.map((s, i) => {
      const href = s.u ? s.u(u, x) : '#';
      const tag = s.u ? 'a' : 'button';
      const attr = s.u ? `href="${href}" target="_blank" rel="noopener"` : `type="button" onclick="HS.copyLink()"`;
      return `<${tag} class="sopt" ${attr}><span class="si" style="background:${s.bg}">${s.ic}</span>${HS.esc(s.t)}</${tag}>`;
    }).join('');
  }
  HS.copyLink = function () {
    const t = shareUrl();
    try { navigator.clipboard.writeText(t); } catch (e) {}
    const b = $('copyBtn'); if (b) { b.textContent = 'Copied ✓'; setTimeout(() => (b.textContent = 'Copy'), 1800); }
  };

  // -------------------------------------------------- search ------------------
  async function wireSearch() {
    const input = $('hs-search'), box = $('hs-search-results');
    if (!input || !box) return;
    const home = state.activeProperty;
    const [projects, changes] = await Promise.all([
      HS.data.projects(state.zip, home), HS.data.changes(state.zip, home)]);
    const idx = [
      ...projects.map(p => ({ label: p.name, sub: p.type, href: 'development.html?id=' + p.id })),
      ...changes.map(c => ({ label: c.title, sub: c.category, href: c.related_project_id ? 'development.html?id=' + c.related_project_id : 'alerts.html' })),
      ...state.properties.map(p => ({ label: p.address, sub: p.city + ', ' + p.state, href: 'property.html?id=' + p.id }))
    ];
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      if (!q) { box.classList.add('hidden'); return; }
      const hits = idx.filter(i => (i.label + ' ' + i.sub).toLowerCase().includes(q)).slice(0, 8);
      box.innerHTML = hits.map(h => `<a href="${h.href}"><b>${HS.esc(h.label)}</b><span>${HS.esc(h.sub)}</span></a>`).join('')
        || '<div class="empty">No matches</div>';
      box.classList.remove('hidden');
    });
    document.addEventListener('click', e => { if (!box.contains(e.target) && e.target !== input) box.classList.add('hidden'); });
  }

  // -------------------------------------------------- bell badge --------------
  async function paintBell() {
    const badge = $('hs-bell-badge'); if (!badge) return;
    const changes = await HS.data.changes(state.zip, state.activeProperty);
    const open = changes.filter(c => { const d = HS.daysUntil(c.window_closes_at); return d != null && d >= 0; }).length;
    if (open > 0) { badge.textContent = open; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  }

  // -------------------------------------------------- persistence seam --------
  async function persistEmail(table, row) {
    if (CFG.DATA_SOURCE !== 'supabase') { LS.set('pending:' + table, [...(LS.get('pending:' + table, [])), row]); return; }
    try { await HS.sb().from(table).insert(row); } catch (e) { console.warn('persist', table, e); }
  }
  async function persistFollow(type, id, on) {
    if (CFG.DATA_SOURCE !== 'supabase' || !state.session) return;
    try {
      if (on) await HS.sb().from('follows').insert({ user_id: state.session.user.id, target_type: type, target_id: id });
      else await HS.sb().from('follows').delete().match({ user_id: state.session.user.id, target_type: type, target_id: id });
    } catch (e) { console.warn('follow', e); }
  }
  async function persistTopics(category, topics, consent) {
    if (CFG.DATA_SOURCE !== 'supabase' || !state.session) return;
    try {
      await HS.sb().from('topic_prefs').upsert({
        user_id: state.session.user.id, category, topics, share_consent: consent
      }, { onConflict: 'user_id,category' });
    } catch (e) { console.warn('topics', e); }

  'privacy': { nav: '', html: `

Object.defineProperty(HS, 'nav', { configurable:true, set:function(u){ HS.route(u); } });
HS.route = function(u){
  if(!u) return;
  if(/^(https?:|mailto:|data:|blob:)/i.test(u)){ window.open(u,'_blank','noopener'); return; }
  var parts = String(u).split('?'); var file = parts[0].split('/').pop();
  HS.__search = parts[1] ? ('?'+parts[1]) : '';
  var M = {'index.html':'home','':'home','today.html':'today','dashboard.html':'dash',
    'alerts.html':'alerts','development.html':'dev','maps.html':'maps','properties.html':'props',
    'property.html':'prop','community.html':'comm','reports.html':'reports',
    'contact.html':'contact','privacy.html':'privacy'};
  HS.showPage(M[file] || 'home');
};
HS.showPage = function(name){
  var p = HS.pages[name] || HS.pages.home;
  var slot = document.getElementById('hs-slot'); if(!slot) return;
  slot.innerHTML = p.html;
  document.querySelectorAll('.nav a').forEach(function(a){ a.classList.remove('on'); });
  if(p.nav){ var a = document.querySelector('.nav a[data-nav="'+p.nav+'"]'); if(a) a.classList.add('on'); }
  window.scrollTo(0,0);
  try { p.init(); } catch(e){ console.error('page init', name, e); }
};
document.addEventListener('click', function(e){
  var a = e.target.closest && e.target.closest('a[href]'); if(!a) return;
  var h = a.getAttribute('href');
  if(h && /\.html(\?|$)/.test(h)){ e.preventDefault(); HS.route(h); }
});
HS.onReady(function(){ HS.route('index.html'); });
