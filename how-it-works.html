  <div class="page">
    <div class="ph">
      <div class="eyebrow">How it works</div>
      <h1>What you get in every community.</h1>
      <p>Two ways in — the same pairing you'll find on your dashboard for each place you follow: see what's being built around your home, and choose exactly what lands in your inbox.</p>
    </div>

    <div class="cols">
      <div class="block prose">
        <h2 class="bt">Development — see what's happening around your home</h2>
        <ul>
          <li>Type in your address or ZIP and instantly see everything being built near you on one easy-to-read map.</li>
          <li>Get a heads-up the moment projects open for public comment — and how many days you have left to weigh in.</li>
          <li>Know your area at a glance: industrial sites near you, what's newly proposed, what's open for comment, and the total on record.</li>
          <li>View your neighborhood as a flat map, aerial, or satellite — and zoom in or out to focus on what's closest to home.</li>
          <li>See everything sorted into three plain buckets: operating now, approved and coming, and still proposed.</li>
          <li>Click any facility to see who it is, its status, and its violations — then jump to the official EPA or government record in one click to verify.</li>
        </ul>
        <p><a href="homesignalmap.html" data-znav="homesignalmap.html">Open the development map →</a></p>
      </div>

      <div class="block prose">
        <h2 class="bt">Alerts — only hear about what matters to you</h2>
        <ul>
          <li>Choose exactly what lands in your inbox instead of getting one firehose of everything.</li>
          <li>Turn whole categories on or off — government notices, upcoming meetings, local news.</li>
          <li>Fine-tune the topics you follow: planning &amp; zoning, property taxes, public safety, data centers, water quality, and more.</li>
          <li>Follow the bigger picture too — how peer communities handle the same issues, and new tech &amp; infrastructure proposals.</li>
          <li>Watch a live feed of what's new, split into what's happening right in your ZIP vs. regional and national context.</li>
          <li>See upcoming meetings with dates, spot the new ones at a glance, and sign up to attend or follow a specific one.</li>
        </ul>
        <p><a href="community.html">Set up your alerts →</a></p>
      </div>
    </div>

    <div class="block prose" style="max-width:840px">
      <h2 class="bt">Where the information comes from</h2>
      <p>HomeSignal pulls from official sources such as government public-notice websites and local news, then organizes them into a single, readable feed for your community: permits &amp; applications, planning &amp; zoning hearings, city &amp; county agendas, court &amp; legal filings, and local news sources.</p>
      <div class="cnote"><b>Neutral · sourced · non-partisan.</b> Every item traces back to its official public record, so you can verify it yourself.</div>
      <h2 class="bt">Find your community</h2>
      <p>Enter your ZIP code to open what's changing around your area, or <a href="index.html">start from the homepage</a>. If we're not in your area yet, add your email and we'll notify you the moment HomeSignal goes live there.</p>
    </div>
  </div>
